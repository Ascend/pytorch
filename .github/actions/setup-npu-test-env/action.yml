name: 'Setup NPU Test Environment'
description: 'Common environment setup for NPU upstream tests - checkout, cache, install PyTorch/torch_npu/triton-ascend, test dependencies'

inputs:
  python_version:
    required: true
    type: string
    description: Python version to use
  pytorch_version:
    required: true
    type: string
    description: PyTorch version to install
  torch_npu_wheel_artifact:
    required: true
    type: string
    description: Name of the torch_npu wheel artifact
  prepared_test_src_artifact:
    required: true
    type: string
    description: Name of the prepared test source artifact
  cache_key_prefix:
    required: false
    type: string
    default: 'pip-py'
    description: Prefix for cache key (allows different cache strategies)
  patch_log_suffix:
    required: false
    type: string
    default: 'setup'
    description: Suffix for torch_env_patch log filename

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: kerer-ai/pytorch
        ref: v2.7.1_dev_fast
        fetch-depth: 1
        path: ascend_pytorch

    - name: Install uv (fast pip replacement)
      shell: bash
      run: |
        PIP=pip${{ inputs.python_version }}
        $PIP install uv
        uv --version

    - name: Download built torch_npu wheel
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.torch_npu_wheel_artifact }}
        path: torch-npu-wheel-artifact

    - name: Uninstall pre-installed torch/torchvision
      shell: bash
      run: |
        pip${{ inputs.python_version }} uninstall -y torch torchvision || true
        echo "Pre-installed torch/torchvision uninstalled"

    - name: Install PyTorch ${{ inputs.pytorch_version }} and built torch_npu
      shell: bash
      run: |
        source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
        source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

        PIP=pip${{ inputs.python_version }}

        $PIP install --upgrade pip setuptools wheel
        uv pip install --system torch==${{ inputs.pytorch_version }} --index-url https://download.pytorch.org/whl/cpu

        TORCH_NPU_WHL=$(ls torch-npu-wheel-artifact/*.whl | head -1)
        uv pip install --system "${TORCH_NPU_WHL}"

        echo "PyTorch ${{ inputs.pytorch_version }} and torch_npu installed from ${TORCH_NPU_WHL}"

    - name: Verify NPU device
      shell: bash
      run: |
        source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
        source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

        echo "=== NPU Device Information ==="
        npu-smi info
        echo "=== End of NPU Device Information ==="

    - name: Install triton-ascend
      shell: bash
      run: |
        # Map Python version to triton-ascend wheel naming
        PY_VER=$(echo "${{ inputs.python_version }}" | tr -d '.')
        TRITON_ASCEND_WHL="triton_ascend-3.2.1-cp${PY_VER}-cp${PY_VER}-manylinux_2_27_aarch64.manylinux_2_28_aarch64.whl"
        TRITON_ASCEND_URL="https://gitcode.com/Ascend/triton-ascend/releases/download/v3.2.1/${TRITON_ASCEND_WHL}"

        echo "=== Installing triton-ascend for Python ${{ inputs.python_version }} ==="
        echo "Download URL: ${TRITON_ASCEND_URL}"
        curl -sL "${TRITON_ASCEND_URL}" -o "/tmp/${TRITON_ASCEND_WHL}" || echo "triton-ascend wheel download failed"
        if [ -f "/tmp/${TRITON_ASCEND_WHL}" ]; then
          if uv pip install --system "/tmp/${TRITON_ASCEND_WHL}"; then
            echo "triton-ascend installed successfully"
          else
            echo "triton-ascend installation failed"
          fi
        fi

    - name: Download prepared test source
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.prepared_test_src_artifact }}
        path: prepared-test-src-artifact

    - name: Extract prepared test source
      shell: bash
      run: |
        tar -xzf prepared-test-src-artifact/pytorch-test-src.tar.gz

    - name: Verify NPU availability
      shell: bash
      run: |
        source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
        source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

        PYTHON=python${{ inputs.python_version }}
        $PYTHON -c "
        import torch
        print(f'torch: {torch.__version__}')
        import torch_npu
        print(f'torch_npu: {torch_npu.__version__}')
        print(f'NPU available: {torch.npu.is_available()}')
        print(f'NPU count: {torch.npu.device_count()}')
        "

    - name: Install test dependencies
      shell: bash
      run: |
        # Use Huawei PyPI mirror for faster downloads
        export UV_INDEX_URL=https://mirrors.huaweicloud.com/repository/pypi/simple

        echo "=== Installing PyTorch requirements.txt ==="
        cd pytorch-test-src
        if [ -f requirements.txt ]; then
          uv pip install --system -r requirements.txt || echo "Some PyTorch dev dependencies may not be available"
        fi

        echo "=== Installing PyTorch CI requirements ==="
        if [ -f .ci/docker/requirements-ci.txt ]; then
          uv pip install --system -r .ci/docker/requirements-ci.txt || echo "Some CI dependencies may not be available on this platform"
        fi

        echo "=== Installing ascend_pytorch test requirements ==="
        cd ../ascend_pytorch
        if [ -f test/requirements.txt ]; then
          uv pip install --system -r test/requirements.txt || echo "Some torch_npu test dependencies may not be available"
        fi

        cd ../pytorch-test-src

        echo "=== Upgrading ml-dtypes to 0.5.4 ==="
        uv pip install --system ml-dtypes==0.5.4 || echo "ml-dtypes upgrade failed"

        echo "=== Installed test dependencies ==="
        pip${{ inputs.python_version }} list | grep -E "pytest|onnx|z3|tensorboard|expecttest|hypothesis|torchvision|torch_geometric|ml-dtypes" | head -30

    - name: Apply torch environment patches
      shell: bash
      run: |
        source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
        source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

        PYTHON=python${{ inputs.python_version }}
        cd ascend_pytorch/test_upstream
        chmod +x torch_env_patch.sh

        echo "=== Applying torch environment patches ==="
        ./torch_env_patch.sh --python=${{ inputs.python_version }} --verbose 2>&1 | tee /tmp/torch_env_patch_${{ inputs.patch_log_suffix }}.log
        PATCH_STATUS=$?

        if [ ${PATCH_STATUS} -ne 0 ]; then
          echo "WARNING: Torch environment patch application returned non-zero status: ${PATCH_STATUS}"
          echo "Tests will continue, but some may fail due to missing patches"
        fi