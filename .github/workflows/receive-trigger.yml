name: Receive Trigger

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
        description: Event type from repository_dispatch (pull_request or push)
      payload:
        required: true
        type: string
        description: Full client_payload as a JSON string

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      upstream_repo: ${{ steps.extract.outputs.upstream_repo }}
      should_build: ${{ steps.extract.outputs.should_build }}
    steps:
      - name: Extract build parameters from payload
        id: extract
        env:
          PAYLOAD_JSON: ${{ inputs.payload }}
          EVENT_TYPE: ${{ inputs.event_type }}
        run: |
          set -euo pipefail

          # ---- Filter: only merged PRs targeting main ----
          if [ "${EVENT_TYPE}" = "pull_request" ]; then
            ACTION=$(echo "$PAYLOAD_JSON" | jq -r '.payload.action // empty')
            BASE_REF=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.base.ref // empty')
            if [ "${ACTION}" != "closed" ]; then
              echo "SKIP: PR action is '${ACTION}', not 'closed'"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "${BASE_REF}" != "main" ]; then
              echo "SKIP: PR targets '${BASE_REF}', not 'main'"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # repository_dispatch payload may not populate `merged` correctly.
            # pytorch/pytorch CI adds a "Merged" label to merged PRs — use that.
            HAS_MERGED=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.labels // [] | map(.name) | index("Merged") // ""')
            if [ -z "${HAS_MERGED}" ]; then
              echo "SKIP: PR does not have 'Merged' label"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [ "${EVENT_TYPE}" = "push" ]; then
            echo "SKIP: push events are not processed"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "ERROR: Unknown event_type: ${EVENT_TYPE}"
            exit 1
          fi

          # ---- Extract build parameters ----
          # (Filter above guarantees: pull_request, closed, target=main, has "Merged" label)
          # Build always pulls latest main from the upstream repo — no SHA extraction needed.
          UPSTREAM_REPO=$(echo "$PAYLOAD_JSON" | jq -r '.payload.repository.full_name // empty')

          if [ -z "${UPSTREAM_REPO}" ]; then
            echo "ERROR: Could not extract upstream_repo from payload"
            exit 1
          fi

          echo "upstream_repo=${UPSTREAM_REPO}" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"

          echo "=== Extracted Build Parameters ==="
          echo "event_type:    ${EVENT_TYPE}"
          echo "upstream_repo: ${UPSTREAM_REPO}"
          echo "upstream_ref:  main  (latest upstream main branch)"

  build:
    needs: extract
    if: ${{ needs.extract.outputs.should_build == 'true' }}
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    with:
      upstream_repo: ${{ needs.extract.outputs.upstream_repo }}
      upstream_ref: main
      torch_npu_repo: Ascend/pytorch
      torch_npu_ref: master
      report_to_upstream: true

  test:
    needs: [extract, build]
    if: ${{ needs.extract.outputs.should_build == 'true' && needs.build.result == 'success' }}
    uses: ./.github/workflows/_test-single.yml
    secrets: inherit
    with:
      resolved_short: ${{ needs.build.outputs.resolved_short }}
      test_files: test_functionalization.py
      report_to_upstream: true
