name: Receive Trigger

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
        description: Event type from repository_dispatch (pull_request or push)
      payload:
        required: true
        type: string
        description: Full client_payload as a JSON string

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      upstream_repo: ${{ steps.extract.outputs.upstream_repo }}
      upstream_sha: ${{ steps.extract.outputs.upstream_sha }}
      upstream_fork_repo: ${{ steps.extract.outputs.upstream_fork_repo }}
      should_build: ${{ steps.extract.outputs.should_build }}
    steps:
      - name: Extract build parameters from payload
        id: extract
        env:
          PAYLOAD_JSON: ${{ inputs.payload }}
          EVENT_TYPE: ${{ inputs.event_type }}
        run: |
          set -euo pipefail

          # ---- Filter: only PR closed events targeting main ----
          if [ "${EVENT_TYPE}" = "pull_request" ]; then
            ACTION=$(echo "$PAYLOAD_JSON" | jq -r '.payload.action // empty')
            BASE_REF=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.base.ref // empty')
            if [ "${ACTION}" != "closed" ]; then
              echo "SKIP: PR action is '${ACTION}', not 'closed'"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "${BASE_REF}" != "main" ]; then
              echo "SKIP: PR targets '${BASE_REF}', not 'main'"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [ "${EVENT_TYPE}" = "push" ]; then
            echo "SKIP: push events are not processed"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "ERROR: Unknown event_type: ${EVENT_TYPE}"
            exit 1
          fi

          # ---- Extract build parameters ----
          UPSTREAM_REPO=$(echo "$PAYLOAD_JSON" | jq -r '.payload.repository.full_name // empty')

          if [ "${EVENT_TYPE}" = "pull_request" ]; then
            UPSTREAM_SHA=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.head.sha // empty')
            HEAD_REPO=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.head.repo.full_name // empty')
            BASE_REPO=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.base.repo.full_name // empty')
            if [ "${HEAD_REPO}" != "${BASE_REPO}" ] && [ -n "${HEAD_REPO}" ]; then
              UPSTREAM_FORK_REPO="${HEAD_REPO}"
            else
              UPSTREAM_FORK_REPO=""
            fi
          elif [ "${EVENT_TYPE}" = "push" ]; then
            UPSTREAM_SHA=$(echo "$PAYLOAD_JSON" | jq -r '.payload.after // empty')
            UPSTREAM_FORK_REPO=""
          else
            echo "ERROR: Unknown event_type: ${EVENT_TYPE}"
            exit 1
          fi

          if [ -z "${UPSTREAM_REPO}" ]; then
            echo "ERROR: Could not extract upstream_repo from payload"
            exit 1
          fi
          if [ -z "${UPSTREAM_SHA}" ]; then
            echo "ERROR: Could not extract upstream_sha from payload"
            exit 1
          fi

          echo "upstream_repo=${UPSTREAM_REPO}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "upstream_fork_repo=${UPSTREAM_FORK_REPO}" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"

          echo "=== Extracted Build Parameters ==="
          echo "event_type:         ${EVENT_TYPE}"
          echo "upstream_repo:      ${UPSTREAM_REPO}"
          echo "upstream_sha:       ${UPSTREAM_SHA}"
          echo "upstream_fork_repo: ${UPSTREAM_FORK_REPO:-<none>}"

  build:
    needs: extract
    if: ${{ needs.extract.outputs.should_build == 'true' }}
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    with:
      upstream_repo: ${{ needs.extract.outputs.upstream_repo }}
      upstream_sha: ${{ needs.extract.outputs.upstream_sha }}
      upstream_fork_repo: ${{ needs.extract.outputs.upstream_fork_repo }}
      torch_npu_repo: ${{ github.repository }}
      torch_npu_ref: master
