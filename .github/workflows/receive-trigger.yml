name: Receive Trigger

on:
  workflow_call:
    inputs:
      event_type:
        required: true
        type: string
        description: Event type from repository_dispatch (pull_request or push)
      payload:
        required: true
        type: string
        description: Full client_payload as a JSON string

jobs:
  extract:
    runs-on: ubuntu-latest
    outputs:
      upstream_repo: ${{ steps.extract.outputs.upstream_repo }}
      should_build: ${{ steps.extract.outputs.should_build }}
    steps:
      - name: Extract build parameters from payload
        id: extract
        env:
          PAYLOAD_JSON: ${{ inputs.payload }}
          EVENT_TYPE: ${{ inputs.event_type }}
        run: |
          set -euo pipefail

          # ---- Filter: only merged PRs targeting main ----
          if [ "${EVENT_TYPE}" = "pull_request" ]; then
            ACTION=$(echo "$PAYLOAD_JSON" | jq -r '.payload.action // empty')
            BASE_REF=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.base.ref // empty')
            if [ "${ACTION}" != "closed" ]; then
              echo "SKIP: PR action is '${ACTION}', not 'closed'"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "${BASE_REF}" != "main" ]; then
              echo "SKIP: PR targets '${BASE_REF}', not 'main'"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # repository_dispatch payload may not populate `merged` correctly.
            # pytorch/pytorch CI adds a "Merged" label to merged PRs — use that.
            HAS_MERGED=$(echo "$PAYLOAD_JSON" | jq -r '.payload.pull_request.labels // [] | map(.name) | index("Merged") // ""')
            if [ -z "${HAS_MERGED}" ]; then
              echo "SKIP: PR does not have 'Merged' label"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [ "${EVENT_TYPE}" = "push" ]; then
            echo "SKIP: push events are not processed"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "ERROR: Unknown event_type: ${EVENT_TYPE}"
            exit 1
          fi

          # ---- Extract build parameters ----
          # (Filter above guarantees: pull_request, closed, target=main, has "Merged" label)
          # Build always pulls latest main from the upstream repo — no SHA extraction needed.
          UPSTREAM_REPO=$(echo "$PAYLOAD_JSON" | jq -r '.payload.repository.full_name // empty')

          if [ -z "${UPSTREAM_REPO}" ]; then
            echo "ERROR: Could not extract upstream_repo from payload"
            exit 1
          fi

          echo "upstream_repo=${UPSTREAM_REPO}" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"

          echo "=== Extracted Build Parameters ==="
          echo "event_type:    ${EVENT_TYPE}"
          echo "upstream_repo: ${UPSTREAM_REPO}"
          echo "upstream_ref:  main  (latest upstream main branch)"

  report_build_start:
    needs: [extract]
    if: ${{ needs.extract.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Report build in_progress
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress
          job-name: pytorch_and_torch-npu_build

  build:
    needs: [extract, report_build_start]
    if: ${{ needs.extract.outputs.should_build == 'true' }}
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    with:
      upstream_repo: ${{ needs.extract.outputs.upstream_repo }}
      upstream_ref: main
      torch_npu_repo: Ascend/pytorch
      torch_npu_ref: master
      report_to_upstream: true

  report_build_end:
    needs: [extract, build]
    if: ${{ always() && needs.extract.outputs.should_build == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Report build completed
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: ${{ needs.build.result == 'success' && 'success' || 'failure' }}
          job-name: pytorch_and_torch-npu_build

  report_start:
    needs: [extract, build]
    if: ${{ needs.extract.outputs.should_build == 'true' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Report in_progress
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress
          job-name: test

  test:
    needs: [extract, build, report_start]
    if: ${{ needs.extract.outputs.should_build == 'true' && needs.build.result == 'success' }}
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      resolved_short: ${{ needs.build.outputs.resolved_short }}
      case_paths_config: .github/config/test_whitelist.yml

  report_end:
    needs: [extract, build, test]
    if: ${{ always() && needs.extract.outputs.should_build == 'true' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download consolidated test summary
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: npu-full-test-summary
          path: summary

      - name: Parse test results
        id: parse
        run: |
          SUMMARY_JSON="summary/npu-full-test-summary.json"
          if [ ! -f "${SUMMARY_JSON}" ]; then
            echo "WARNING: summary JSON not found (test may have failed before reporting)"
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "skipped=0" >> "$GITHUB_OUTPUT"
            echo "total=0" >> "$GITHUB_OUTPUT"
            echo "total_failed=1" >> "$GITHUB_OUTPUT"
            echo "parse_ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 -c "
          import json, os, sys
          try:
              with open('${SUMMARY_JSON}') as f:
                  d = json.load(f)
              totals = d.get('totals', {})
              passed = totals.get('passed', 0)
              failed = totals.get('failed', 0)
              errors = totals.get('errors', 0)
              timeout = totals.get('timeout', 0)
              skipped = totals.get('skipped', 0)
              total = totals.get('total', 0)
              total_failed = failed + errors + timeout
              parse_ok = 'true'
          except Exception as e:
              print(f'WARNING: Failed to parse summary JSON: {e}', file=sys.stderr)
              passed = 0
              failed = 0
              errors = 0
              timeout = 0
              skipped = 0
              total = 0
              total_failed = 1
              parse_ok = 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'passed={passed}\n')
              f.write(f'failed={failed}\n')
              f.write(f'timeout={timeout}\n')
              f.write(f'skipped={skipped}\n')
              f.write(f'total={total}\n')
              f.write(f'total_failed={total_failed}\n')
              f.write(f'parse_ok={parse_ok}\n')
          print(f'Results: {passed} passed, {failed} failed, {errors} errors, {timeout} timeout, {skipped} skipped, {total} total')
          "

      - name: Report completed
        if: always()
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: ${{ steps.parse.outputs.parse_ok == 'true' && steps.parse.outputs.total_failed == '0' && 'success' || 'failure' }}
          job-name: test
          test-results: >-
            {
              "passed": ${{ steps.parse.outputs.passed }},
              "failed": ${{ steps.parse.outputs.total_failed }},
              "skipped": ${{ steps.parse.outputs.skipped }},
              "total": ${{ steps.parse.outputs.total }}
            }
