name: Torch NPU Upstream Test Custom

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
        description: Python version to use
      prepared_test_src_artifact:
        required: true
        type: string
        description: Name of the prepared test source artifact
      torch_npu_wheel_artifact:
        required: true
        type: string
        description: Name of the torch_npu wheel artifact
      docker_image:
        required: true
        type: string
        description: Docker image to use
      test_files:
        required: true
        type: string
        description: Test files to run (comma-separated)

defaults:
  run:
    shell: bash

jobs:
  run_tests:
    name: test_custom
    runs-on: linux-aarch64-a3-16
    timeout-minutes: 1800
    container:
      image: ${{ inputs.docker_image }}
      options: --user root

    steps:

      - name: Setup NPU test environment
        uses: kerer-ai/pytorch/.github/actions/setup-npu-test-env@v2.7.1_image
        with:
          python_version: ${{ inputs.python_version }}
          torch_npu_wheel_artifact: ${{ inputs.torch_npu_wheel_artifact }}
          prepared_test_src_artifact: ${{ inputs.prepared_test_src_artifact }}
          patch_log_suffix: custom

      - name: Run custom test files (serial, per-case process isolation)
        id: run_tests
        env:
          CI: ''
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          REPORT_DIR=test-reports
          JUNIT_DIR="${REPORT_DIR}/junit_xmls"
          CASES_LOG_DIR="${REPORT_DIR}/cases_logs"
          mkdir -p ${REPORT_DIR} ${JUNIT_DIR} ${CASES_LOG_DIR}

          TEST_FILES="${{ inputs.test_files }}"
          set +e

          # ==================================================================
          # Execution mode detection (checked in priority order):
          #   1. SAME_PROCESS: prefix → all nodeids in one pytest (control experiment)
          #   2. Contains "::" → per-case independent pytest processes (serial)
          #   3. Otherwise → file path mode (run_npu_test_shard.py)
          # ==================================================================

          if echo "${TEST_FILES}" | grep -q "^SAME_PROCESS:"; then
            # ================================================================
            # SAME_PROCESS mode: all cases in a SINGLE pytest invocation.
            # Control experiment — eliminates BOTH cross-process HBM
            # contention AND per-case subprocess isolation.
            # If this PASSES → proves HBM concurrency is the root cause.
            # If this FAILS → proves pytest.main() batch is the root cause.
            # ================================================================
            echo "=== SAME_PROCESS mode: all cases in one pytest process ==="

            # Strip prefix and get nodeids
            RAW_NODEIDS="${TEST_FILES#SAME_PROCESS:}"
            ORIG_CWD=$(pwd)
            REPORT_DIR=$(realpath "${REPORT_DIR}")
            JUNIT_DIR="${REPORT_DIR}/junit_xmls"
            CASES_LOG_DIR="${REPORT_DIR}/cases_logs"
            mkdir -p ${JUNIT_DIR} ${CASES_LOG_DIR}

            # Switch to test directory
            TEST_SRC_DIR="pytorch-test-src/test"
            cd "${TEST_SRC_DIR}"
            echo "Working directory: $(pwd)"

            # Bind to single NPU device (matching original run behavior
            # where each worker subprocess was pinned to one device).
            # This prevents the process from spanning multiple devices
            # and isolates the per-process memory space.
            export ASCEND_RT_VISIBLE_DEVICES=0
            echo "NPU device binding: ASCEND_RT_VISIBLE_DEVICES=0"

            # Build pytest nodeid args (strip test/ prefix from each)
            IFS=',' read -ra NODEIDS <<< "${RAW_NODEIDS}"
            PARSED_NODEIDS=()
            for nid in "${NODEIDS[@]}"; do
              nid=$(echo "${nid}" | xargs)
              PARSED_NODEIDS+=("${nid#test/}")
            done

            TOTAL_CASES=${#PARSED_NODEIDS[@]}
            echo "Running ${TOTAL_CASES} cases in a single pytest process:"
            for nid in "${PARSED_NODEIDS[@]}"; do
              echo "  - ${nid}"
            done

            # Generate combined log filename
            xml_file="${JUNIT_DIR}/same_process_combined.xml"
            log_file="${CASES_LOG_DIR}/same_process_combined.log"

            start_time=$(date +%s)
            python${{ inputs.python_version }} -m pytest \
              --color=no -ra --tb=short \
              "${PARSED_NODEIDS[@]}" \
              --junitxml="${xml_file}" \
              --timeout=1200 -v \
              > "${log_file}" 2>&1
            rc=$?
            end_time=$(date +%s)
            duration=$((end_time - start_time))

            if [ "${rc}" -eq 0 ]; then
              echo "[PASS] All ${TOTAL_CASES} cases passed in one process (${duration}s)"
              OVERALL_STATUS=0
            else
              echo "[FAIL] Some cases failed (rc=${rc}, ${duration}s)"
              echo "See full log: ${log_file}"
              tail -80 "${log_file}"
              OVERALL_STATUS=1
            fi

            echo ""
            echo "=============================================="
            echo "SAME_PROCESS mode complete"
            echo "  Total cases: ${TOTAL_CASES}"
            echo "  Duration:    ${duration}s"
            echo "  Exit code:   ${rc}"
            echo "  If PASSED → HBM concurrency IS the root cause"
            echo "  If FAILED → pytest.main() batch IS the root cause"
            echo "=============================================="
            TEST_STATUS=${OVERALL_STATUS}

          elif echo "${TEST_FILES}" | grep -q "::"; then
            # ================================================================
            # Nodeid mode: direct pytest per-case, serial, independent process
            # Each nodeid runs in its own pytest invocation (true per-case
            # process isolation). Ensures no concurrent HBM access across
            # Dies on the same A3 Chip.
            # ================================================================
            echo "=== Nodeid serial mode: each case in its own pytest process ==="

            # Resolve absolute paths before changing directory
            ORIG_CWD=$(pwd)
            REPORT_DIR=$(realpath "${REPORT_DIR}")
            JUNIT_DIR="${REPORT_DIR}/junit_xmls"
            CASES_LOG_DIR="${REPORT_DIR}/cases_logs"
            mkdir -p ${JUNIT_DIR} ${CASES_LOG_DIR}

            # Switch to test directory (matching run_npu_test_shard.py behavior)
            TEST_SRC_DIR="pytorch-test-src/test"
            cd "${TEST_SRC_DIR}"
            echo "Working directory: $(pwd)"

            # Bind to single NPU device (matching original run_npu_test_shard.py
            # behavior where each worker round-robins to one device).
            export ASCEND_RT_VISIBLE_DEVICES=0
            echo "NPU device binding: ASCEND_RT_VISIBLE_DEVICES=0"

            IFS=',' read -ra NODEIDS <<< "${TEST_FILES}"
            TOTAL_CASES=${#NODEIDS[@]}
            PASSED=0
            FAILED=0
            ERRORS=0
            OVERALL_STATUS=0

            for i in "${!NODEIDS[@]}"; do
              nodeid=$(echo "${NODEIDS[$i]}" | xargs)

              # Strip "test/" prefix from nodeid to match cwd (pytorch-test-src/test/)
              # e.g. "test/functorch/test_ops.py::..." -> "functorch/test_ops.py::..."
              pytest_nodeid="${nodeid#test/}"

              case_idx=$((i + 1))

              # Generate safe filename from nodeid
              safe_name=$(echo "${nodeid}" | sed 's/[\/:]/_/g' | sed 's/__*/_/g' | sed 's/^_//')
              xml_file="${JUNIT_DIR}/custom_${case_idx}_${safe_name}.xml"
              log_file="${CASES_LOG_DIR}/custom_${case_idx}_${safe_name}.log"

              echo ""
              echo "=== [${case_idx}/${TOTAL_CASES}] ${nodeid} ==="

              start_time=$(date +%s)
              python${{ inputs.python_version }} -m pytest \
                --color=no -ra --tb=short \
                "${pytest_nodeid}" \
                --junitxml="${xml_file}" \
                --timeout=1200 -v \
                > "${log_file}" 2>&1
              rc=$?
              end_time=$(date +%s)
              duration=$((end_time - start_time))

              case "${rc}" in
                0) status="passed";  PASSED=$((PASSED + 1));   echo "  [PASS] (${duration}s)" ;;
                1) status="failed";  FAILED=$((FAILED + 1));   echo "  [FAIL] (${duration}s)"; OVERALL_STATUS=1 ;;
                *) status="error";   ERRORS=$((ERRORS + 1));   echo "  [ERR] rc=${rc} (${duration}s)"; OVERALL_STATUS=1 ;;
              esac

              # Append to combined log
              echo "[${case_idx}/${TOTAL_CASES}] ${status^^} ${nodeid} (${duration}s)" >> /tmp/test_custom.log

              # Also dump failure output to combined log for easy viewing
              if [ "${rc}" -ne 0 ]; then
                echo "--- FAILURE LOG: ${nodeid} ---" >> /tmp/test_custom.log
                tail -80 "${log_file}" >> /tmp/test_custom.log
                echo "--- END FAILURE: ${nodeid} ---" >> /tmp/test_custom.log
              fi
            done

            echo ""
            echo "=============================================="
            echo "Serial nodeid execution complete"
            echo "  Total:  ${TOTAL_CASES}"
            echo "  Passed: ${PASSED}"
            echo "  Failed: ${FAILED}"
            echo "  Errors: ${ERRORS}"
            echo "  Exit code: ${OVERALL_STATUS}"
            echo "=============================================="
            TEST_STATUS=${OVERALL_STATUS}

          else
            # ================================================================
            # File path mode: use run_npu_test_shard.py for auto case discovery
            #   --max-workers 1: only one worker at a time (serial)
            #   --max-cases-per-batch 10000: all cases in one pytest process
            #   (simulates direct "pytest test_ops.py" execution)
            # ================================================================
            echo "=== File path mode: using run_npu_test_shard.py ==="
            python${{ inputs.python_version }} ascend_pytorch/.github/scripts/run_npu_test_shard.py \
              --test-files "${TEST_FILES}" \
              --test-dir pytorch-test-src/test \
              --disabled-testcases pytorch-test-src/test_upstream/disabled_testcases.json \
              --report-dir ${REPORT_DIR} \
              --timeout 1200 \
              --max-workers 1 \
              --max-cases-per-batch 10000 \
              --verbose \
              2>&1 | tee /tmp/test_custom.log

            TEST_STATUS=${PIPESTATUS[0]}
          fi

          echo "status=${TEST_STATUS}" >> $GITHUB_OUTPUT
          # Don't exit with test status - let step succeed to allow report generation

      - name: Package and upload test reports
        if: always()
        run: |
          # Package junit XMLs into compressed archive
          if [ -d "test-reports/junit_xmls" ]; then
            echo "=== Compressing junit XMLs ==="
            XML_COUNT=$(find test-reports/junit_xmls -type f -name "*.xml" | wc -l)
            echo "Found ${XML_COUNT} XML files"
            tar -czf test-reports/junit_xmls.tar.gz -C test-reports junit_xmls
            rm -rf test-reports/junit_xmls
            echo "JUnit XMLs compressed: $(ls -lh test-reports/junit_xmls.tar.gz)"
          fi

          # Package cases logs into compressed archive
          if [ -d "test-reports/cases_logs" ]; then
            echo "=== Compressing cases logs ==="
            LOGS_COUNT=$(find test-reports/cases_logs -type f | wc -l)
            echo "Found ${LOGS_COUNT} case log files"
            tar -czf test-reports/cases_logs.tar.gz -C test-reports cases_logs
            rm -rf test-reports/cases_logs
            echo "Cases logs compressed: $(ls -lh test-reports/cases_logs.tar.gz)"
          fi

          # Package shard_cases.json
          if [ -f "test-reports/shard_custom-1_cases.json" ]; then
            echo "Cases JSON exists: $(ls -lh test-reports/shard_custom-1_cases.json)"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-custom
          path: test-reports/
          retention-days: 60

      - name: Compress and upload error logs
        if: failure()
        run: |
          mkdir -p error-logs
          cp /tmp/test_custom.log error-logs/ 2>/dev/null || true
          cp /tmp/torch_env_patch_custom.log error-logs/ 2>/dev/null || true
          tar -czf error-logs-custom.tar.gz error-logs/
          echo "Error logs compressed"

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-custom
          path: error-logs-custom.tar.gz
          retention-days: 60

      - name: Compress /root/ascend CANN logs
        if: always()
        run: |
          if [ -d "/root/ascend" ]; then
            echo "=== Compressing /root/ascend CANN logs ==="
            FILE_COUNT=$(find /root/ascend -type f | wc -l)
            echo "Found ${FILE_COUNT} files under /root/ascend"
            tar -czf ascend-cann-logs-custom.tar.gz -C /root ascend
            echo "CANN logs compressed: $(ls -lh ascend-cann-logs-custom.tar.gz)"
          else
            echo "/root/ascend directory does not exist, skipping"
          fi

      - name: Upload CANN logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ascend-cann-logs-custom
          path: ascend-cann-logs-custom.tar.gz
          retention-days: 60