name: Torch NPU Upstream Collect

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
        description: Python version to use
      pytorch_version:
        required: true
        type: string
        description: PyTorch version to install
      prepared_test_src_artifact:
        required: true
        type: string
        description: Name of the prepared test source artifact
      torch_npu_wheel_artifact:
        required: true
        type: string
        description: Name of the torch_npu wheel artifact
      docker_image:
        required: true
        type: string
        description: Docker image to use
      distributed_shards:
        required: false
        type: string
        default: '2'
        description: Number of shards for distributed tests
      regular_shards:
        required: false
        type: string
        default: '5'
        description: Number of shards for regular tests
    outputs:
      distributed_matrix:
        description: Distributed shard matrix JSON
        value: ${{ jobs.collect.outputs.distributed_matrix }}
      regular_matrix:
        description: Regular shard matrix JSON
        value: ${{ jobs.collect.outputs.regular_matrix }}
      distributed_shards:
        description: Number of distributed shards
        value: ${{ jobs.collect.outputs.distributed_shards }}
      regular_shards:
        description: Number of regular shards
        value: ${{ jobs.collect.outputs.regular_shards }}
      total_cases:
        description: Total number of test cases
        value: ${{ jobs.collect.outputs.total_cases }}

jobs:
  collect:
    runs-on: linux-aarch64-a3-8
    timeout-minutes: 60
    container:
      image: ${{ inputs.docker_image }}
      options: --user root
    outputs:
      distributed_matrix: ${{ steps.collect_and_shard.outputs.distributed_matrix }}
      regular_matrix: ${{ steps.collect_and_shard.outputs.regular_matrix }}
      distributed_shards: ${{ steps.collect_and_shard.outputs.distributed_shards }}
      regular_shards: ${{ steps.collect_and_shard.outputs.regular_shards }}
      total_cases: ${{ steps.collect_and_shard.outputs.total_cases }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: kerer-ai/pytorch
          ref: v2.7.1_dev
          fetch-depth: 1
          path: ascend_pytorch

      - name: Setup cache directories
        run: |
          mkdir -p /github/home/.cache/pip
          chmod -R 777 /github/home/.cache

      - name: Cache pip (shared with build)
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/pip
          # Same key as build - any newly downloaded packages will be saved
          key: pip-py${{ inputs.python_version }}-torch${{ inputs.pytorch_version }}-shared
          restore-keys: |
            pip-py${{ inputs.python_version }}-torch${{ inputs.pytorch_version }}-
            pip-py${{ inputs.python_version }}-

      - name: Download built torch_npu wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.torch_npu_wheel_artifact }}
          path: torch-npu-wheel-artifact

      - name: Uninstall pre-installed torch/torchvision
        run: |
          pip${{ inputs.python_version }} uninstall -y torch torchvision || true
          echo "Pre-installed torch/torchvision uninstalled"

      - name: Install PyTorch ${{ inputs.pytorch_version }} and built torch_npu
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PIP=pip${{ inputs.python_version }}
          PYTHON=python${{ inputs.python_version }}
          export PIP_CACHE_DIR=/github/home/.cache/pip

          $PIP install --upgrade pip setuptools wheel
          $PIP install torch==${{ inputs.pytorch_version }} --index-url https://download.pytorch.org/whl/cpu
          $PIP install torchvision==${{ inputs.pytorch_version }} --index-url https://download.pytorch.org/whl/cpu || echo "torchvision not available for this version"

          TORCH_NPU_WHL=$(ls torch-npu-wheel-artifact/*.whl | head -1)
          $PIP install "${TORCH_NPU_WHL}"

          echo "PyTorch ${{ inputs.pytorch_version }} and torch_npu installed from ${TORCH_NPU_WHL}"

      - name: Install triton-ascend
        run: |
          PIP=pip${{ inputs.python_version }}
          PYTHON=python${{ inputs.python_version }}

          # Map Python version to triton-ascend wheel naming
          PY_VER=$(echo "${{ inputs.python_version }}" | tr -d '.')
          TRITON_ASCEND_URL="https://gitcode.com/Ascend/triton-ascend/releases/download/v3.2.1/triton_ascend-3.2.1-cp${PY_VER}-cp${PY_VER}-manylinux_2_27_aarch64.manylinux_2_28_aarch64.whl"

          echo "=== Installing triton-ascend for Python ${{ inputs.python_version }} ==="
          echo "Download URL: ${TRITON_ASCEND_URL}"
          curl -sL "${TRITON_ASCEND_URL}" -o /tmp/triton_ascend.whl || echo "triton-ascend wheel download failed"
          if [ -f /tmp/triton_ascend.whl ]; then
            if $PIP install /tmp/triton_ascend.whl; then
              echo "triton-ascend installed successfully"
            else
              echo "triton-ascend installation failed"
            fi
          fi

      - name: Download prepared test source
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.prepared_test_src_artifact }}
          path: prepared-test-src-artifact

      - name: Extract prepared test source
        run: |
          tar -xzf prepared-test-src-artifact/pytorch-test-src.tar.gz

      - name: Verify NPU availability
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ inputs.python_version }}
          $PYTHON -c "
          import torch
          print(f'torch: {torch.__version__}')
          import torch_npu
          print(f'torch_npu: {torch_npu.__version__}')
          print(f'NPU available: {torch.npu.is_available()}')
          print(f'NPU count: {torch.npu.device_count()}')
          "

      - name: Install test dependencies
        run: |
          PIP=pip${{ inputs.python_version }}
          export PIP_CACHE_DIR=/github/home/.cache/pip

          echo "=== Installing PyTorch requirements.txt ==="
          # PyTorch requirements should be in the cloned test source
          cd pytorch-test-src
          if [ -f requirements.txt ]; then
            $PIP install -r requirements.txt || echo "Some PyTorch dev dependencies may not be available"
          fi

          echo "=== Installing PyTorch CI requirements ==="
          if [ -f .ci/docker/requirements-ci.txt ]; then
            $PIP install -r .ci/docker/requirements-ci.txt || echo "Some CI dependencies may not be available on this platform"
          else
            # Download if not present in test source
            curl -sL "https://raw.githubusercontent.com/pytorch/pytorch/v${{ inputs.pytorch_version }}/.ci/docker/requirements-ci.txt" -o /tmp/pytorch_ci_requirements.txt
            $PIP install -r /tmp/pytorch_ci_requirements.txt || echo "Some CI dependencies may not be available on this platform"
          fi

          echo "=== Installing ascend_pytorch test requirements ==="
          cd ../ascend_pytorch
          if [ -f test/requirements.txt ]; then
            $PIP install -r test/requirements.txt || echo "Some torch_npu test dependencies may not be available"
          fi

          cd ../pytorch-test-src
          echo "=== Installed test dependencies ==="
          $PIP list | grep -E "pytest|onnx|z3|tensorboard|expecttest|hypothesis|torchvision|torch_geometric" | head -30

      - name: Apply torch environment patches
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ inputs.python_version }}
          cd ascend_pytorch/test_upstream
          chmod +x torch_env_patch.sh

          echo "=== Applying torch environment patches ==="
          ./torch_env_patch.sh --python=${{ inputs.python_version }} --verbose 2>&1 | tee /tmp/torch_env_patch_collect.log
          PATCH_STATUS=$?

          if [ ${PATCH_STATUS} -ne 0 ]; then
            echo "WARNING: Torch environment patch application returned non-zero status: ${PATCH_STATUS}"
            echo "Case collection will continue, but some tests may fail later"
          fi

      - name: Collect all test cases and shard
        id: collect_and_shard
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ inputs.python_version }}
          cd pytorch-test-src

          # Case-level sharding
          DISTRIBUTED_SHARDS='${{ inputs.distributed_shards }}'
          REGULAR_SHARDS='${{ inputs.regular_shards }}'

          echo "=== Collecting all test cases ==="
          echo "Distributed shards: ${DISTRIBUTED_SHARDS}"
          echo "Regular shards: ${REGULAR_SHARDS}"

          $PYTHON ../ascend_pytorch/.github/scripts/collect_all_cases.py \
            --test-dir test \
            --case-paths-config test_upstream/case_paths_ci.yml \
            --distributed-shards ${DISTRIBUTED_SHARDS} \
            --regular-shards ${REGULAR_SHARDS} \
            --output-dir cases_shards \
            --error-log-dir collection_errors \
            --parallel 16 \
            2>&1 | tee /tmp/collect_cases.log

          # Verify output
          echo "=== Generated shard files ==="
          ls -la cases_shards/

          echo "=== Collection summary ==="
          cat cases_shards/cases_collection_summary.json

          # Extract total cases from summary
          TOTAL_CASES=$(python3 -c "import json; d=json.load(open('cases_shards/cases_collection_summary.json')); print(d['total_cases'])")

          # Build shard matrices
          DIST_SHARDS=$(seq 1 ${DISTRIBUTED_SHARDS} | tr '\n' ',' | sed 's/,$//')
          REG_SHARDS=$(seq 1 ${REGULAR_SHARDS} | tr '\n' ',' | sed 's/,$//')

          echo "distributed_matrix=[${DIST_SHARDS}]" >> $GITHUB_OUTPUT
          echo "distributed_shards=${DISTRIBUTED_SHARDS}" >> $GITHUB_OUTPUT
          echo "regular_matrix=[${REG_SHARDS}]" >> $GITHUB_OUTPUT
          echo "regular_shards=${REGULAR_SHARDS}" >> $GITHUB_OUTPUT
          echo "total_cases=${TOTAL_CASES}" >> $GITHUB_OUTPUT

          echo "=== Shard configuration ==="
          echo "Distributed tests: ${DISTRIBUTED_SHARDS} shards (case-level, serial execution, linux-aarch64-a3-16)"
          echo "Regular tests: ${REGULAR_SHARDS} shards (case-level, 64 workers, linux-aarch64-a3-16)"
          echo "Total cases: ${TOTAL_CASES}"

          # Package error logs if any
          if [ -d "collection_errors" ] && [ "$(ls -A collection_errors 2>/dev/null)" ]; then
            echo "=== Packaging collection error logs ==="
            tar -czf collection_errors.tar.gz collection_errors/
            echo "Error logs packaged: collection_errors.tar.gz"
            ls -la collection_errors.tar.gz
          fi

      - name: Upload cases shard JSONs
        uses: actions/upload-artifact@v4
        with:
          name: cases-shards
          path: pytorch-test-src/cases_shards/
          retention-days: 7

      - name: Upload collection error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-error-logs
          path: pytorch-test-src/collection_errors.tar.gz
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload collect logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collect-cases-logs
          path: |
            /tmp/collect_cases.log
            /tmp/torch_env_patch_collect.log
          if-no-files-found: warn
          retention-days: 30