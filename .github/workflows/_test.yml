name: Test torch_npu wheels

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
        default: '3.11'
      docker_image_tag:
        required: true
        type: string
        description: 'Docker image tag (same as build)'
    outputs:
      test-result:
        description: 'Test result (success/failure)'
        value: ${{ jobs.test.outputs.result }}

env:
  PYTHON_VERSION: ${{ inputs.python_version }}

jobs:
  test:
    runs-on: linux-aarch64-a3-16
    timeout-minutes: 30
    outputs:
      result: ${{ steps.final_status.outputs.result }}

    container:
      image: quay.io/kerer/pytorch:${{ inputs.docker_image_tag }}
      options: --user root

    steps:
      - name: Download PyTorch wheel
        uses: actions/download-artifact@v4
        with:
          name: torch-wheel-main
          path: wheels/

      - name: Download torch_npu wheel
        uses: actions/download-artifact@v4
        with:
          name: torch-npu-wheel-main
          path: wheels/

      - name: Display downloaded wheels
        run: |
          echo "=== Downloaded wheels ==="
          ls -la wheels/

      - name: Install built wheels
        run: |
          PYTHON=python${{ env.PYTHON_VERSION }}

          echo "=== Installing PyTorch wheel ==="
          pip${{ env.PYTHON_VERSION }} install wheels/torch-*.whl --force-reinstall

          echo ""
          echo "=== Installing torch_npu wheel ==="
          pip${{ env.PYTHON_VERSION }} install wheels/torch_npu-*.whl --force-reinstall

          echo ""
          echo "=== Installed packages ==="
          pip${{ env.PYTHON_VERSION }} list | grep -E "torch|torch_npu"

      - name: Verify NPU availability
        continue-on-error: true
        run: |
          # 切换到 /tmp 目录，避免源码目录干扰 torch 导入
          cd /tmp

          echo "=== CANN Directory Contents ==="
          ls -la /usr/local/Ascend/ || echo "Ascend directory not found"
          echo ""
          echo "=== CANN Version Info ==="
          if [ -d /usr/local/Ascend/cann ]; then
            ls -la /usr/local/Ascend/cann/
            echo ""
            echo "=== CANN Version File ==="
            cat /usr/local/Ascend/cann/version.info 2>/dev/null || echo "version.info not found"
          else
            echo "CANN directory not found"
          fi
          echo ""
          echo "=== NNAL Directory Contents ==="
          if [ -d /usr/local/Ascend/nnal ]; then
            ls -la /usr/local/Ascend/nnal/
          else
            echo "NNAL directory not found"
          fi

          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          echo ""
          echo "=== NPU-SMI Info ==="
          npu-smi info || echo "npu-smi not available"

          PYTHON=python${{ env.PYTHON_VERSION }}
          echo ""
          echo "=== PyTorch and NPU Info ==="
          $PYTHON -c "
          import torch
          print(f'torch: {torch.__version__}')
          import torch_npu
          print(f'torch_npu: {torch_npu.__version__}')
          print(f'NPU available: {torch.npu.is_available()}')
          print(f'NPU count: {torch.npu.device_count()}')
          if torch.npu.is_available():
              print(f'NPU name: {torch.npu.get_device_name(0)}')
              print(f'NPU capability: {torch.npu.get_device_capability(0)}')
          " 2>&1 || echo "torch/torch_npu import failed - this is expected if torch and torch_npu versions are mismatched"

      - name: Run basic smoke test
        id: smoke_test
        run: |
          cd /tmp

          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ env.PYTHON_VERSION }}

          echo "=== Running smoke test ==="
          $PYTHON << 'EOF'
          import torch
          import torch_npu

          print(f"torch version: {torch.__version__}")
          print(f"torch_npu version: {torch_npu.__version__}")

          # Basic tensor operations
          x = torch.randn(2, 3)
          print(f"Tensor created on CPU: {x.device}")

          # Move to NPU if available
          if torch.npu.is_available():
              try:
                  x_npu = x.npu()
                  print(f"Tensor moved to NPU: {x_npu.device}")
                  y = torch.randn(2, 3).npu()
                  z = x_npu + y
                  print(f"Addition result shape: {z.shape}")
                  print(f"Result device: {z.device}")
                  print("Smoke test PASSED")
              except Exception as e:
                  print(f"NPU operation failed: {e}")
                  print("Smoke test FAILED")
                  exit(1)
          else:
              print("NPU not available, smoke test SKIPPED (CPU only)")
          EOF

          echo "smoke_result=passed" >> $GITHUB_OUTPUT

      - name: Set final status
        id: final_status
        if: always()
        run: |
          if [ "${{ steps.smoke_test.outputs.smoke_result }}" == "passed" ]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "::notice::All tests passed"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "::error::Tests failed"
            exit 1
          fi