name: Torch NPU Upstream Test Regular

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
        description: Python version to use
      pytorch_version:
        required: true
        type: string
        description: PyTorch version to install
      prepared_test_src_artifact:
        required: true
        type: string
        description: Name of the prepared test source artifact
      torch_npu_wheel_artifact:
        required: true
        type: string
        description: Name of the torch_npu wheel artifact
      docker_image:
        required: true
        type: string
        description: Docker image to use
      regular_matrix:
        required: true
        type: string
        description: Regular shard matrix JSON
      regular_shards:
        required: true
        type: string
        description: Number of regular shards

jobs:
  run_tests:
    name: test_regular (${{ matrix.shard }}/${{ inputs.regular_shards }})
    runs-on: linux-aarch64-a3-16
    timeout-minutes: 1200
    container:
      image: ${{ inputs.docker_image }}
      options: --user root
    strategy:
      matrix:
        shard: ${{ fromJson(inputs.regular_matrix) }}
      fail-fast: false
      max-parallel: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: kerer-ai/pytorch
          ref: v2.7.1_dev
          fetch-depth: 1
          path: ascend_pytorch

      - name: Setup cache directories
        run: |
          mkdir -p /github/home/.cache/pip
          chmod -R 777 /github/home/.cache

      - name: Cache pip (shared with build/collect)
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/pip
          # Same key as build/collect - reuses cached packages
          key: pip-py${{ inputs.python_version }}-torch${{ inputs.pytorch_version }}-shared
          restore-keys: |
            pip-py${{ inputs.python_version }}-torch${{ inputs.pytorch_version }}-
            pip-py${{ inputs.python_version }}-

      - name: Download built torch_npu wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.torch_npu_wheel_artifact }}
          path: torch-npu-wheel-artifact

      - name: Uninstall pre-installed torch/torchvision
        run: |
          pip${{ inputs.python_version }} uninstall -y torch torchvision || true
          echo "Pre-installed torch/torchvision uninstalled"

      - name: Install PyTorch ${{ inputs.pytorch_version }} and built torch_npu
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PIP=pip${{ inputs.python_version }}
          PYTHON=python${{ inputs.python_version }}
          export PIP_CACHE_DIR=/github/home/.cache/pip

          $PIP install --upgrade pip setuptools wheel
          $PIP install torch==${{ inputs.pytorch_version }} --index-url https://download.pytorch.org/whl/cpu
          $PIP install torchvision==${{ inputs.pytorch_version }} --index-url https://download.pytorch.org/whl/cpu || echo "torchvision not available for this version"

          TORCH_NPU_WHL=$(ls torch-npu-wheel-artifact/*.whl | head -1)
          $PIP install "${TORCH_NPU_WHL}"

          echo "PyTorch ${{ inputs.pytorch_version }} and torch_npu installed from ${TORCH_NPU_WHL}"

      - name: Install triton-ascend
        run: |
          PIP=pip${{ inputs.python_version }}
          PYTHON=python${{ inputs.python_version }}

          # Map Python version to triton-ascend wheel naming
          PY_VER=$(echo "${{ inputs.python_version }}" | tr -d '.')
          TRITON_ASCEND_URL="https://gitcode.com/Ascend/triton-ascend/releases/download/v3.2.1/triton_ascend-3.2.1-cp${PY_VER}-cp${PY_VER}-manylinux_2_27_aarch64.manylinux_2_28_aarch64.whl"

          echo "=== Installing triton-ascend for Python ${{ inputs.python_version }} ==="
          echo "Download URL: ${TRITON_ASCEND_URL}"
          curl -sL "${TRITON_ASCEND_URL}" -o /tmp/triton_ascend.whl || echo "triton-ascend wheel download failed"
          if [ -f /tmp/triton_ascend.whl ]; then
            $PIP install /tmp/triton_ascend.whl || echo "triton-ascend installation failed"
            echo "triton-ascend installed successfully"
          fi

      - name: Download prepared test source
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.prepared_test_src_artifact }}
          path: prepared-test-src-artifact

      - name: Extract prepared test source
        run: |
          tar -xzf prepared-test-src-artifact/pytorch-test-src.tar.gz

      - name: Verify NPU availability
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ inputs.python_version }}
          $PYTHON -c "
          import torch
          print(f'torch: {torch.__version__}')
          import torch_npu
          print(f'torch_npu: {torch_npu.__version__}')
          print(f'NPU available: {torch.npu.is_available()}')
          print(f'NPU count: {torch.npu.device_count()}')
          if torch.npu.is_available():
              print(f'NPU name: {torch.npu.get_device_name(0)}')
          "

      - name: Install test dependencies
        run: |
          PIP=pip${{ inputs.python_version }}
          export PIP_CACHE_DIR=/github/home/.cache/pip

          echo "=== Installing PyTorch requirements.txt ==="
          cd pytorch-test-src
          if [ -f requirements.txt ]; then
            $PIP install -r requirements.txt || echo "Some PyTorch dev dependencies may not be available"
          fi

          echo "=== Installing PyTorch CI requirements ==="
          if [ -f .ci/docker/requirements-ci.txt ]; then
            $PIP install -r .ci/docker/requirements-ci.txt || echo "Some CI dependencies may not be available on this platform"
          else
            curl -sL "https://raw.githubusercontent.com/pytorch/pytorch/v${{ inputs.pytorch_version }}/.ci/docker/requirements-ci.txt" -o /tmp/pytorch_ci_requirements.txt
            $PIP install -r /tmp/pytorch_ci_requirements.txt || echo "Some CI dependencies may not be available on this platform"
          fi

          echo "=== Installing ascend_pytorch test requirements ==="
          cd ../ascend_pytorch
          if [ -f test/requirements.txt ]; then
            $PIP install -r test/requirements.txt || echo "Some torch_npu test dependencies may not be available"
          fi

          cd ../pytorch-test-src
          echo "=== Installed test dependencies ==="
          $PIP list | grep -E "pytest|onnx|z3|tensorboard|expecttest|hypothesis|torchvision|torch_geometric" | head -30

      - name: Apply torch environment patches
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ inputs.python_version }}
          cd ascend_pytorch/test_upstream
          chmod +x torch_env_patch.sh

          echo "=== Applying torch environment patches ==="
          ./torch_env_patch.sh --python=${{ inputs.python_version }} --verbose 2>&1 | tee /tmp/torch_env_patch_reg_${{ matrix.shard }}.log
          PATCH_STATUS=$?

          if [ ${PATCH_STATUS} -ne 0 ]; then
            echo "WARNING: Torch environment patch application returned non-zero status: ${PATCH_STATUS}"
            echo "Tests will continue, but some may fail due to missing patches"
          fi

      - name: Download cases shard JSONs
        uses: actions/download-artifact@v4
        with:
          name: cases-shards
          path: cases-shards

      - name: Run regular shard ${{ matrix.shard }}/${{ inputs.regular_shards }}
        id: run_test
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          PYTHON=python${{ inputs.python_version }}
          REPORT_DIR=test-reports
          CASES_JSON="cases-shards/regular_cases_shard_${{ matrix.shard }}.json"

          mkdir -p ${REPORT_DIR}

          # Get case count from JSON
          TOTAL_CASES=$(python3 -c "import json; d=json.load(open('${CASES_JSON}')); print(d['total_cases'])")

          echo "=== Regular Shard ${{ matrix.shard }} (Case-level) ==="
          echo "Total cases: ${TOTAL_CASES}"
          echo "Runner: linux-aarch64-a3-16 (16-card NPU)"
          echo "Execution mode: CONCURRENT (64 workers)"

          # Regular tests: pre-collected cases, 64 concurrent workers
          set +e
          $PYTHON ascend_pytorch/.github/scripts/run_npu_test_shard.py \
            --cases-json "${CASES_JSON}" \
            --test-dir pytorch-test-src/test \
            --disabled-testcases pytorch-test-src/test_upstream/disabled_testcases.json \
            --report-dir ${REPORT_DIR} \
            --timeout 1200 \
            --max-workers 64 \
            --verbose \
            2>&1 | tee /tmp/test_shard_reg_${{ matrix.shard }}.log

          TEST_STATUS=${PIPESTATUS[0]}
          set -e
          echo "status=${TEST_STATUS}" >> $GITHUB_OUTPUT
          # Don't exit with test status - let step succeed to allow report generation

      - name: Package and upload test reports
        if: always()
        run: |
          # Package junit XMLs into compressed archive
          if [ -d "test-reports/junit_xmls" ]; then
            echo "=== Compressing junit XMLs ==="
            XML_COUNT=$(find test-reports/junit_xmls -type f -name "*.xml" | wc -l)
            echo "Found ${XML_COUNT} XML files"
            tar -czf test-reports/junit_xmls.tar.gz -C test-reports junit_xmls
            rm -rf test-reports/junit_xmls
            echo "JUnit XMLs compressed: $(ls -lh test-reports/junit_xmls.tar.gz)"
          fi

          # Package failed cases logs into compressed archive
          if [ -d "test-reports/failed_cases_logs" ]; then
            echo "=== Compressing failed cases logs ==="
            FAILED_LOGS_COUNT=$(find test-reports/failed_cases_logs -type f | wc -l)
            echo "Found ${FAILED_LOGS_COUNT} failed case log files"
            tar -czf test-reports/failed_cases_logs.tar.gz -C test-reports failed_cases_logs
            rm -rf test-reports/failed_cases_logs
            echo "Failed cases logs compressed: $(ls -lh test-reports/failed_cases_logs.tar.gz)"
          fi

          # Package shard_cases.json
          if [ -f "test-reports/shard_reg-${{ matrix.shard }}_cases.json" ]; then
            echo "Cases JSON exists: $(ls -lh test-reports/shard_reg-${{ matrix.shard }}_cases.json)"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-reg-${{ matrix.shard }}
          path: test-reports/
          retention-days: 30

      - name: Compress and upload error logs
        if: failure()
        run: |
          # Only upload logs when tests failed
          mkdir -p error-logs
          cp /tmp/test_shard_reg_${{ matrix.shard }}.log error-logs/ 2>/dev/null || true
          cp /tmp/torch_env_patch_reg_${{ matrix.shard }}.log error-logs/ 2>/dev/null || true
          tar -czf error-logs-reg-${{ matrix.shard }}.tar.gz error-logs/
          echo "Error logs compressed: $(ls -lh error-logs-reg-${{ matrix.shard }}.tar.gz)"

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-reg-${{ matrix.shard }}
          path: error-logs-reg-${{ matrix.shard }}.tar.gz
          retention-days: 30