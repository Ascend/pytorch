name: Decoupled Test Pipeline

on:
  pull_request:
    paths:
      - '.github/**'
      - 'test_upstream/**'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      pytorch_commit:
        description: 'PyTorch commit to checkout for test source'
        required: false
        type: string
        default: '0545bb23f54b26001534a83f25f2729ad8770b68'
      torch_npu_ref:
        description: 'Branch/ref of ascend-pytorch to build (empty = current branch)'
        required: false
        type: string
        default: ''

jobs:
  trigger_test:
    uses: ./.github/workflows/_torch-npu-upstream-test.yml
    with:
      docker_image_build: 'swr.cn-north-4.myhuaweicloud.com/frameworkptadapter/pytorch_master_a2_aarch64_builder:20260704'
      distributed_shards: '5'
      regular_shards: '5'
      test_files: ''
      pytorch_commit: ${{ inputs.pytorch_commit || '0545bb23f54b26001534a83f25f2729ad8770b68' }}
      torch_npu_ref: ${{ inputs.torch_npu_ref || '' }}
