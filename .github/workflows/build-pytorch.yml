name: Build PyTorch from Source

on:
  workflow_dispatch:  # Manual trigger only
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight

jobs:
  build-pytorch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
        build-type: ["develop", "install"]

    steps:
    - name: Checkout PyTorch
      uses: actions/checkout@v4
      with:
        repository: pytorch/pytorch
        ref: main
        path: pytorch

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          g++ \
          gcc \
          git \
          libopenblas-dev \
          libopenmpi-dev \
          openmpi-bin \
          openmpi-common \
          libgomp1 \
          libnuma-dev \
          libjpeg-dev \
          libpng-dev

    - name: Install Python build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools
        cd pytorch
        pip install -r requirements.txt -i https://mirrors.huaweicloud.com/repository/pypi/simple

    - name: Build PyTorch (${{ matrix.build-type }})
      working-directory: pytorch
      env:
        USE_CUDA: 0
        USE_CUDNN: 0
        USE_MKLDNN: 0
        USE_NNPACK: 0
        USE_QNNPACK: 0
        USE_XNNPACK: 0
        USE_DISTRIBUTED: 0
        USE_OPENMP: 1
        USE_FBGEMM: 0
        USE_NUMPY: 1
        BUILD_TEST: 0
        _GLIBCXX_USE_CXX11_ABI: 1
        MAX_JOBS: 4
      run: |
        echo "Building PyTorch with Python ${{ matrix.python-version }} in ${{ matrix.build-type }} mode"

        if [ "${{ matrix.build-type }}" = "develop" ]; then
          # Development mode (editable install)
          python setup.py develop
          echo "PyTorch installed in development mode"
        else
          # Install mode (regular install)
          python setup.py install
          echo "PyTorch installed regularly"
        fi

    - name: Test PyTorch installation
      run: |
        python -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'PyTorch build config: {torch.__config__.show()}')"
        python -c "import torch; x = torch.randn(3, 3); y = x @ x.t(); print(f'Matrix multiplication test: {y.shape}')"

    - name: Upload build info
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: pytorch-build-info-${{ matrix.python-version }}-${{ matrix.build-type }}
        path: |
          pytorch/build/lib*/torch/__config__.py
          pytorch/build/lib*/torch/version.py
        retention-days: 30