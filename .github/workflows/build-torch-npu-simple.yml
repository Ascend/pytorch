name: Build Torch NPU (Simple)

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build-torch-npu:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout kerer-ai/pytorch
      uses: actions/checkout@v4
      with:
        path: torch-npu

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install basic Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install wheel setuptools pyyaml auditwheel -i https://mirrors.huaweicloud.com/repository/pypi/simple

    - name: Install PyTorch (pre-built)
      run: |
        # Install a compatible PyTorch version
        pip install torch==2.1.0 -i https://mirrors.huaweicloud.com/repository/pypi/simple

    - name: Initialize submodules
      working-directory: torch-npu
      run: |
        if [ -f .gitmodules ]; then
          git submodule update --init --recursive
        fi

    - name: Check build environment
      working-directory: torch-npu
      run: |
        echo "Python version: $(python --version)"
        echo "Pip version: $(pip --version)"
        python -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'PyTorch path: {torch.__file__}')"

        # Check if setup.py can be parsed
        python -m py_compile setup.py
        echo "setup.py syntax OK"

        # Check build script
        if [ -f ci/build.sh ]; then
          bash -n ci/build.sh
          echo "Build script syntax OK"
        fi

    - name: Attempt build (dry run)
      working-directory: torch-npu
      env:
        _GLIBCXX_USE_CXX11_ABI: 1
        USE_CUDA: 0
      run: |
        echo "Attempting to build torch_npu..."
        echo "Note: This will likely fail due to missing CANN dependencies"

        # Try to run setup.py in dry-run mode
        python setup.py build --dry-run || echo "Dry run completed (may show errors)"

    - name: Check for CANN dependencies
      working-directory: torch-npu
      run: |
        echo "Checking for CANN-related files..."
        find . -type f -name "*.py" -exec grep -l "cann\|CANN\|ascend\|Ascend" {} \; | head -10 || true
        echo ""
        echo "Checking build dependencies in setup.py..."
        grep -n "cann\|CANN\|ascend\|Ascend" setup.py | head -10 || true

    - name: Create build report
      if: always()
      run: |
        echo "=== Build Environment Report ==="
        echo "OS: $(uname -a)"
        echo "Python: $(python --version)"
        echo "PyTorch: $(python -c 'import torch; print(torch.__version__)' 2>/dev/null || echo 'Not installed')"
        echo ""
        echo "=== Next Steps ==="
        echo "1. This build requires CANN (Compute Architecture for Neural Networks) environment"
        echo "2. CANN is Huawei's software stack for Ascend NPU"
        echo "3. For full build, need:"
        echo "   - CANN toolkit installed"
        echo "   - Ascend driver installed"
        echo "   - NPU hardware or emulator"
        echo ""
        echo "=== Workflow Status ===" > report.md
        echo "- PyTorch: Installed" >> report.md
        echo "- torch_npu: Requires CANN" >> report.md
        echo "- Build: Partial (environment check only)" >> report.md

    - name: Upload build report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: torch-npu-build-report
        path: report.md
        retention-days: 7