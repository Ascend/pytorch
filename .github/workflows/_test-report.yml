name: Test Report

on:
  workflow_call:
    inputs:
      distributed_matrix:
        required: false
        type: string
        default: '[]'
        description: Distributed shard matrix JSON
      regular_matrix:
        required: false
        type: string
        default: '[]'
        description: Regular shard matrix JSON
      docker_image:
        required: false
        type: string
        default: 'quay.io/kerer/pytorch:torch-npu-test-aarch64-cann-a3-py3.10-torch-nightly'
        description: Docker image used for test execution

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo for report scripts
        uses: actions/checkout@v6
        with:
          ref: ci-test

      - name: Download distributed shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-dist-*
          path: all-test-reports
          merge-multiple: true
        continue-on-error: true

      - name: Download regular shard reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-reg-*
          path: all-test-reports
          merge-multiple: true
        continue-on-error: true

      - name: Download cases collection summary
        uses: actions/download-artifact@v4
        with:
          name: cases-shards
          path: cases-shards
        continue-on-error: true

      - name: Generate consolidated summary
        id: generate_report
        run: |
          REPORT_MD=npu-full-test-summary.md
          REPORT_JSON=npu-full-test-summary.json

          DIST_MATRIX='${{ inputs.distributed_matrix }}'
          REG_MATRIX='${{ inputs.regular_matrix }}'

          COMBINED_MATRIX=$(python3 -c "import sys,json; dist=json.loads('${DIST_MATRIX}'); reg=json.loads('${REG_MATRIX}'); print(json.dumps(['dist-'+str(s) for s in dist]+['reg-'+str(s) for s in reg]))")

          python3 .github/scripts/generate_npu_full_test_report.py \
            --reports-root all-test-reports \
            --output-markdown ${REPORT_MD} \
            --output-json ${REPORT_JSON} \
            --pytorch-version "nightly" \
            --torch-npu-whl "source-build" \
            --patch-count "0" \
            --shard-matrix-json "${COMBINED_MATRIX}" \
            --docker-image "${{ inputs.docker_image }}" \
            --runner "linux-aarch64-a3-8 (collect), linux-aarch64-a3-8 (distributed, serial), linux-aarch64-a3-8 (regular, 16 workers)" \
            --cases-summary cases-shards/cases_collection_summary.json \
            --cases-by-file-dir cases-shards

          cat ${REPORT_MD} >> $GITHUB_STEP_SUMMARY

          # Extract totals for upstream report
          if [ -f "${REPORT_JSON}" ]; then
            python3 -c "
          import json, os
          with open('${REPORT_JSON}') as f:
              d = json.load(f)
          totals = d.get('totals', {})
          total_failed = totals.get('failed', 0) + totals.get('errors', 0)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'passed={totals.get(\"passed\", 0)}\n')
              f.write(f'failed={totals.get(\"failed\", 0)}\n')
              f.write(f'errors={totals.get(\"errors\", 0)}\n')
              f.write(f'skipped={totals.get(\"skipped\", 0)}\n')
              f.write(f'total={totals.get(\"total\", 0)}\n')
              f.write(f'total_failed={total_failed}\n')
          " || true
          fi

      - name: Upload consolidated summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npu-full-test-summary
          path: |
            npu-full-test-summary.md
            npu-full-test-summary.json
            distributed_cases_results_by_file.jsonl
            regular_cases_results_by_file.jsonl
          if-no-files-found: warn
          retention-days: 60
