name: Build Docker Images

on:
  push:
    paths:
      - '.ci/docker/**'
      - '.github/workflows/build-docker-images.yml'
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated: test-aarch64-a2, test-aarch64-a3)'
        required: false
        type: string
        default: 'test-aarch64-a2'
      push:
        description: 'Push images to registry'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: quay.io
  QUAY_ORG: kerer
  IMAGE_NAME: pytorch

jobs:
  matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.select.outputs.images }}
      do_push: ${{ steps.select.outputs.do_push }}
    steps:
      - name: Select images to build
        id: select
        run: |
          ALL_IMAGES='["test-aarch64-a2","test-aarch64-a3"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.images }}"
            JSON=$(echo "${INPUT}" | sed 's/ *, */","/g' | sed 's/^/["/' | sed 's/$/"]/')
            echo "images=${JSON}" >> "$GITHUB_OUTPUT"
            echo "do_push=${{ github.event.inputs.push }}" >> "$GITHUB_OUTPUT"
          else
            echo "images=${ALL_IMAGES}" >> "$GITHUB_OUTPUT"
            echo "do_push=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: matrix-prep
    environment: QUAY_USERNAME
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.matrix-prep.outputs.images) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Quay.io
        if: needs.matrix-prep.outputs.do_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push image
        run: |
          case "${{ matrix.image }}" in
            test-aarch64-a2)
              TAG="torch-npu-test-aarch64-cann-a2-py3.10-torch-nightly"
              ARGS="--build-arg CANN_CHIP=A2 --build-arg PYTHON_VERSION=3.10"
              ;;
            test-aarch64-a3)
              TAG="torch-npu-test-aarch64-cann-a3-py3.10-torch-nightly"
              ARGS="--build-arg CANN_CHIP=A3 --build-arg PYTHON_VERSION=3.10"
              ;;
            *)
              echo "ERROR: Unknown image: ${{ matrix.image }}"
              exit 1
              ;;
          esac

          echo "=== Building: ${TAG} ==="
          set -x
          docker build \
            --tag "${TAG}" \
            --file .ci/docker/test/Dockerfile.aarch64 \
            ${ARGS} \
            .ci/docker
          set +x

          echo "=== Built: ${TAG} ==="
          docker image inspect "${TAG}" --format '  Size: {{ .Size }}'

          REMOTE_IMAGE="${REGISTRY}/${QUAY_ORG}/${IMAGE_NAME}:${TAG}"

          if [ "${{ needs.matrix-prep.outputs.do_push }}" = "true" ]; then
            docker tag "${TAG}" "${REMOTE_IMAGE}"
            docker push "${REMOTE_IMAGE}"
            echo "=== Pushed: ${REMOTE_IMAGE} ==="
          fi

          mkdir -p /tmp/result
          echo "${REMOTE_IMAGE}" > "/tmp/result/${TAG}.txt"

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.image }}
          path: /tmp/result/*.txt
          retention-days: 1

  summary:
    needs: [matrix-prep, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: /tmp/results
          merge-multiple: true

      - name: Generate summary
        run: |
          echo "## Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Image | Pull Command |" >> $GITHUB_STEP_SUMMARY
          echo "|---|-------|-------------|" >> $GITHUB_STEP_SUMMARY

          if [ -d /tmp/results ] && [ "$(ls -A /tmp/results 2>/dev/null)" ]; then
            COUNT=1
            for f in /tmp/results/*.txt; do
              IMAGE=$(cat "$f")
              echo "| ${COUNT} | \`${IMAGE##*:}\` | \`docker pull ${IMAGE}\` |" >> $GITHUB_STEP_SUMMARY
              COUNT=$((COUNT + 1))
            done
          else
            echo "| - | No images built | - |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${REGISTRY}/${QUAY_ORG}/${IMAGE_NAME}\`" >> $GITHUB_STEP_SUMMARY
