name: Test Build Trigger

on:
  push:
    branches:
      - ci-test

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      upstream_repo: pytorch/pytorch
      upstream_sha: 01eed969468437bb410d31eaf5c76b0eabb7ee03
      torch_npu_repo: ${{ github.repository }}
      torch_npu_ref: ci-test
