name: Test Build Trigger

on:
  push:
    branches:
      - ci-test

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    with:
      upstream_repo: pytorch/pytorch
      upstream_sha: f7379c8f87f1371c5285784618ac867ea95da5a5
      torch_npu_repo: ${{ github.repository }}
      torch_npu_ref: ci-test
