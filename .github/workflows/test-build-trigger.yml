name: Test Build Trigger

on:
  workflow_dispatch:

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    with:
      upstream_repo: pytorch/pytorch
      upstream_ref: main
      torch_npu_repo: Ascend/pytorch
      torch_npu_ref: master
      report_to_upstream: true

  test:
    needs: build
    uses: ./.github/workflows/_test-single.yml
    secrets: inherit
    with:
      resolved_short: ${{ needs.build.outputs.resolved_short }}
      test_files: test_functionalization.py
      report_to_upstream: true
