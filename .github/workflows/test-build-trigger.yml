name: Test Build Trigger

on:
  push:
    branches:
      - ci-test

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      upstream_repo: pytorch/pytorch
      upstream_sha: 5daacd359a77af018e3079aef3fe3d05e22cd669
      torch_npu_repo: ${{ github.repository }}
      torch_npu_ref: ci-test
