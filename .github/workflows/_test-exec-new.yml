name: Test Execution (v2)

on:
  workflow_call:
    inputs:
      resolved_short:
        required: true
        type: string
        description: Short SHA of upstream PyTorch
      category:
        required: true
        type: string
        description: Test category (core/tensor/distributed/graph/math)
      num_shards:
        required: true
        type: string
        description: Number of shards for this category
      max_workers:
        required: true
        type: string
        description: Max concurrent workers (3 for concurrent, 1 for serial)
      matrix_json:
        required: true
        type: string
        description: Shard matrix JSON array

jobs:
  test:
    runs-on: linux-aarch64-a3-8
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        shell: bash
    container:
      image: quay.io/kerer/pytorch:torch-npu-test-aarch64-cann-a3-py3.10-torch-nightly
      options: --network host
    env:
      PIP_INDEX_URL: https://mirrors.huaweicloud.com/repository/pypi/simple
    strategy:
      matrix:
        shard: ${{ fromJson(inputs.matrix_json) }}
      fail-fast: false
    steps:
      - name: Authenticate to Huawei Cloud
        uses: huaweicloud/auth-action@v1.1.0
        with:
          access_key_id: ${{ secrets.ACCESSKEY }}
          secret_access_key: ${{ secrets.SECRETACCESSKEY }}
          region: ap-southeast-1

      - name: Compute SHAs
        id: sha
        run: |
          UPSTREAM_SHORT="${{ inputs.resolved_short }}"
          echo "source_tarball=pytorch-source-${UPSTREAM_SHORT}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "wheels_tarball=wheels-${UPSTREAM_SHORT}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Download PyTorch source from OBS
        uses: huaweicloud/obs-helper@v1.0.1
        with:
          region: ap-southeast-1
          bucket_name: pytorch-ci-cache
          local_file_path: ./${{ steps.sha.outputs.source_tarball }}
          obs_file_path: 7day-cache/${{ steps.sha.outputs.source_tarball }}
          operation_type: download

      - name: Extract PyTorch source
        run: |
          tar -xzf ${{ steps.sha.outputs.source_tarball }}
          rm ${{ steps.sha.outputs.source_tarball }}
          echo "PyTorch source extracted: $(du -sh pytorch/ | cut -f1)"

      - name: Download wheels from OBS
        uses: huaweicloud/obs-helper@v1.0.1
        with:
          region: ap-southeast-1
          bucket_name: pytorch-ci-cache
          local_file_path: ./${{ steps.sha.outputs.wheels_tarball }}
          obs_file_path: 7day-cache/${{ steps.sha.outputs.wheels_tarball }}
          operation_type: download

      - name: Extract and install wheels
        run: |
          mkdir -p /tmp/wheels
          tar -xzf ${{ steps.sha.outputs.wheels_tarball }} -C /tmp/wheels
          rm ${{ steps.sha.outputs.wheels_tarball }}
          pip install /tmp/wheels/torch-*.whl
          pip install --no-deps /tmp/wheels/torch_npu*.whl

      - name: Download cases shard JSONs
        uses: actions/download-artifact@v4
        with:
          name: cases-shards-v2
          path: cases-shards

      - name: Checkout CI scripts
        uses: actions/checkout@v6
        with:
          path: ci-scripts
          ref: ci-test

      - name: Verify NPU environment
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          echo "=== NPU Device Information ==="
          npu-smi info
          echo "=== End of NPU Device Information ==="

          python -c "
          import torch
          print(f'torch: {torch.__version__}')
          import torch_npu
          print(f'torch_npu: {torch_npu.__version__}')
          print(f'NPU available: {torch.npu.is_available()}')
          print(f'NPU count: {torch.npu.device_count()}')
          "

      - name: Run ${{ inputs.category }} shard ${{ matrix.shard }}/${{ inputs.num_shards }}
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          export PYTHONPATH="${GITHUB_WORKSPACE}/ci-scripts/.github/scripts/v2:${PYTHONPATH}"

          CASES_JSON="cases-shards/${{ inputs.category }}_files_shard_${{ matrix.shard }}.json"
          TOTAL_FILES=$(python3 -c "import json; d=json.load(open('${CASES_JSON}')); print(d['total_files'])")

          echo "=== ${{ inputs.category }} Shard ${{ matrix.shard }}/${{ inputs.num_shards }} ==="
          echo "Total files: ${TOTAL_FILES}"
          echo "Runner: linux-aarch64-a3-8 (8-card NPU)"
          if [ "${{ inputs.max_workers }}" = "1" ]; then
            echo "Execution mode: SERIAL (file-level, 1 worker)"
          else
            echo "Execution mode: CONCURRENT (file-level, ${{ inputs.max_workers }} workers, spawn Pool)"
          fi

          set +e
          python ci-scripts/.github/scripts/v2/run_npu_test_file.py \
            --files-json "${CASES_JSON}" \
            --test-dir pytorch/test \
            --report-dir test-reports \
            --max-workers ${{ inputs.max_workers }} \
            --timeout 1800 \
            --shard-type ${{ inputs.category }} \
            --shard ${{ matrix.shard }} \
            --verbose \
            2>&1 | tee /tmp/test_${{ inputs.category }}_${{ matrix.shard }}.log

          TEST_STATUS=${PIPESTATUS[0]}
          set -e
          echo "status=${TEST_STATUS}" >> "$GITHUB_OUTPUT"

      - name: Parse test results
        id: parse_results
        if: always()
        run: |
          python3 -c "
          import json, os, sys
          prefix_map = {
              'core': 'core',
              'tensor': 'tensor',
              'distributed': 'dist',
              'graph': 'graph',
              'math': 'math',
          }
          prefix = prefix_map.get('${{ inputs.category }}', 'reg')
          cases_file = f'test-reports/shard_{prefix}-${{ matrix.shard }}_cases.json'
          stats = {'passed': 0, 'failed': 0, 'errors': 0, 'timeout': 0, 'skipped': 0, 'total': 0}
          parse_ok = False
          try:
              with open(cases_file) as f:
                  d = json.load(f)
              stats['passed'] = d.get('passed', 0)
              stats['failed'] = d.get('failed', 0)
              stats['errors'] = d.get('errors', 0)
              stats['timeout'] = d.get('timeout', 0)
              stats['skipped'] = d.get('skipped', 0)
              stats['total'] = d.get('total_cases', 0)
              parse_ok = True
          except Exception as e:
              print(f'Warning: Could not parse results: {e}', file=sys.stderr)
          total_failed = stats['failed'] + stats['errors'] + stats['timeout']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              for k, v in stats.items():
                  f.write(f'{k}={v}\n')
              f.write(f'total_failed={total_failed}\n')
              f.write(f'parse_ok={str(parse_ok).lower()}\n')
          print(f'${{ inputs.category }} shard ${{ matrix.shard }}: {stats[\"passed\"]} passed, {stats[\"failed\"]} failed, {stats[\"errors\"]} errors, {stats[\"timeout\"]} timeout, {stats[\"skipped\"]} skipped, {stats[\"total\"]} total')
          "

      - name: Package test reports
        if: always()
        run: |
          if [ -d "test-reports/junit_xmls" ]; then
            echo "=== Compressing junit XMLs ==="
            XML_COUNT=$(find test-reports/junit_xmls -type f -name "*.xml" | wc -l)
            echo "Found ${XML_COUNT} XML files"
            tar -czf test-reports/junit_xmls.tar.gz -C test-reports junit_xmls
            rm -rf test-reports/junit_xmls
            echo "JUnit XMLs compressed: $(ls -lh test-reports/junit_xmls.tar.gz)"
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ inputs.category }}-${{ matrix.shard }}
          path: test-reports/
          retention-days: 7

      - name: Compress and upload error logs
        if: failure()
        run: |
          mkdir -p error-logs
          cp /tmp/test_${{ inputs.category }}_${{ matrix.shard }}.log error-logs/ 2>/dev/null || true
          tar -czf error-logs-${{ inputs.category }}-${{ matrix.shard }}.tar.gz error-logs/
          echo "Error logs compressed: $(ls -lh error-logs-${{ inputs.category }}-${{ matrix.shard }}.tar.gz)"

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ inputs.category }}-${{ matrix.shard }}
          path: error-logs-${{ inputs.category }}-${{ matrix.shard }}.tar.gz
          retention-days: 7
