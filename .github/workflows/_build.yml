name: Build PyTorch and torch_npu

on:
  workflow_call:
    inputs:
      upstream_repo:
        required: true
        type: string
        description: The upstream repository full name (owner/repo)
      upstream_sha:
        required: true
        type: string
        description: The upstream commit SHA to build
      upstream_fork_repo:
        required: false
        type: string
        default: ''
        description: The fork repository full name for PR from fork (owner/repo)
      downstream_repo:
        required: true
        type: string
        description: The downstream repository full name (owner/repo)
      downstream_ref:
        required: false
        type: string
        default: 'master'
        description: The downstream repository branch, tag, or SHA to build

jobs:
  build:
    runs-on: linux-aarch64-a3-16
    defaults:
      run:
        shell: bash
    container:
      image: quay.io/kerer/pytorch:torch-npu-test-aarch64-cann-a3-py3.10-torch-nightly
      options: --network host
    env:
      MAX_JOBS: 128
      USE_CUDA: 0
      USE_XNNPACK: 0
      _GLIBCXX_USE_CXX11_ABI: 1
      BUILD_IGNORE_SVE_UNAVAILABLE: 1
      BUILD_WITHOUT_SHA: 1
      PIP_INDEX_URL: https://mirrors.huaweicloud.com/repository/pypi/simple
    steps:
      # Step 1: Checkout upstream PyTorch PR code (shallow)
      # fetch-depth: 1 = single commit only, no branches/tags/history.
      # PyTorch repo has thousands of branches; full clone takes ~3min.
      # Submodules init deferred to separate step with --depth=1.
      - name: Checkout upstream PyTorch PR
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.upstream_fork_repo != '' && inputs.upstream_fork_repo || inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
          fetch-depth: 1
          submodules: false
          path: pytorch

      - name: Init submodules (shallow)
        working-directory: pytorch
        run: |
          git submodule update --init --recursive --depth=1 --jobs=$(nproc)

      # Step 2: Build and install PyTorch
      - name: Build and install PyTorch
        id: build_pytorch
        working-directory: pytorch
        run: |
          echo "============================================"
          echo "Building PyTorch from upstream PR..."
          if [ -n "${{ inputs.upstream_fork_repo }}" ]; then
            echo "Fork Repository: ${{ inputs.upstream_fork_repo }}"
          else
            echo "Repository: ${{ inputs.upstream_repo }}"
          fi
          echo "Commit SHA: ${{ inputs.upstream_sha }}"
          echo "MAX_JOBS: ${MAX_JOBS}"
          echo "============================================"

          pip install -r requirements.txt

          # Build wheel first, then install from it.
          # This produces an artifact we can upload for downstream use.
          mkdir -p /tmp/wheels
          python -m pip wheel --no-build-isolation -w /tmp/wheels/ . 2>&1 | tee /tmp/build-pytorch.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "PyTorch build failed!"
            exit ${BUILD_STATUS}
          fi

          pip install /tmp/wheels/torch*.whl

          # Must NOT run from pytorch/ source dir: Python would find
          # the local torch/ source tree instead of the installed package.
          cd /tmp
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          cd "${GITHUB_WORKSPACE}"

      # Step 3: Checkout downstream torch_npu
      - name: Checkout downstream repo (torch_npu)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.downstream_repo }}
          ref: ${{ inputs.downstream_ref }}
          fetch-depth: 1
          submodules: false
          path: torch_npu

      - name: Init submodules (shallow)
        working-directory: torch_npu
        run: |
          git submodule update --init --recursive --depth=1 --jobs=$(nproc)

      # Step 4: Build and install torch_npu
      # NOTE: Intentionally do NOT use 'pip install -r requirements.txt' from torch_npu,
      # because that file pins a specific torch version which would overwrite the
      # source-built PyTorch from the upstream PR.
      - name: Build and install torch_npu
        id: build_torchnpu
        working-directory: torch_npu
        run: |
          echo "============================================"
          echo "Building torch_npu..."
          echo "Repository: ${{ inputs.downstream_repo }}"
          echo "Ref: ${{ inputs.downstream_ref }}"
          echo "============================================"

          bash ci/build.sh --python=3.10 --disable_torchair --disable_rpc --update_aoti_c_shim 2>&1 | tee /tmp/build-torchnpu.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "torch_npu build failed!"
            exit ${BUILD_STATUS}
          fi

          pip install dist/torch_npu*.whl
          cp dist/torch_npu*.whl /tmp/wheels/

      # Step 5: Upload wheel artifacts
      - name: Upload wheel artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.run_number }}
          path: /tmp/wheels/*.whl
          retention-days: 7

      # Step 6: Verify NPU environment and imports
      - name: Verify NPU device
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          echo "=== NPU Device Information ==="
          npu-smi info
          echo "=== End of NPU Device Information ==="

      - name: Verify NPU availability
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          python -c "
          import torch
          print(f'torch: {torch.__version__}')
          import torch_npu
          print(f'torch_npu: {torch_npu.__version__}')
          print(f'NPU available: {torch.npu.is_available()}')
          print(f'NPU count: {torch.npu.device_count()}')
          "

      # Step 7: Upload build artifacts (always, for debugging failures)
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            /tmp/build-pytorch.log
            /tmp/build-torchnpu.log
            torch_npu/torch_npu/csrc/inductor/aoti_torch/generated/c_shim_npu.h
          if-no-files-found: warn

      # Step 8: Summary
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "             Build Summary"
          echo "============================================"
          if [ -n "${{ inputs.upstream_fork_repo }}" ]; then
            echo "PyTorch fork PR : ${{ inputs.upstream_fork_repo }}"
          else
            echo "PyTorch upstream: ${{ inputs.upstream_repo }}"
          fi
          echo "PyTorch commit  : ${{ inputs.upstream_sha }}"
          echo "torch_npu repo  : ${{ inputs.downstream_repo }}"
          echo "Max jobs        : ${MAX_JOBS}"
          echo "============================================"
