name: Build PyTorch and torch_npu

on:
  workflow_call:
    inputs:
      upstream_repo:
        required: true
        type: string
        description: The upstream repository full name (owner/repo)
      upstream_sha:
        required: true
        type: string
        description: The upstream commit SHA to build
      upstream_fork_repo:
        required: false
        type: string
        default: ''
        description: The fork repository full name for PR from fork (owner/repo)
      downstream_repo:
        required: true
        type: string
        description: The downstream repository full name (owner/repo)
      image:
        required: false
        type: string
        default: 'torch-npu-test-x86_64-cann-a1-py3.10-torch-nightly'
        description: Docker image for the build environment
      build-mode:
        required: false
        type: string
        default: 'develop'
        description: Build mode - "develop" for PR, "wheel" for nightly

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      env:
        HOME: /root
        ANACONDA_PYTHON_VERSION: '3.10'
        BUILD_MODE: ${{ inputs.build-mode }}
    steps:
      # Step 1: Initialize conda environment
      - name: Initialize conda environment
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate py_3.10
          echo "Python: $(python --version)"
          echo "Python path: $(which python)"

      # Step 2: Checkout upstream PyTorch PR code
      - name: Checkout upstream PyTorch
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.upstream_fork_repo != '' && inputs.upstream_fork_repo || inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
          submodules: recursive
          path: pytorch

      # Step 3: Checkout downstream torch_npu code
      - name: Checkout torch_npu
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.downstream_repo }}
          ref: master
          submodules: recursive
          path: torch_npu

      # Step 4: Build PyTorch from source
      - name: Build PyTorch from source
        run: |
          echo "=== Building PyTorch from upstream ${{ inputs.upstream_sha }} ==="
          source /opt/conda/etc/profile.d/conda.sh
          conda activate py_3.10
          export PYTORCH_SRC="${GITHUB_WORKSPACE}/pytorch"
          export BUILD_MODE="${{ inputs.build-mode }}"
          bash torch_npu/.ci/pytorch/build_pytorch.sh

      # Step 5: Build torch_npu
      - name: Build torch_npu
        run: |
          echo "=== Building torch_npu from master ==="
          source /opt/conda/etc/profile.d/conda.sh
          conda activate py_3.10
          export TORCH_NPU_SRC="${GITHUB_WORKSPACE}/torch_npu"
          export BUILD_MODE="${{ inputs.build-mode }}"
          bash torch_npu/.ci/pytorch/build_torch_npu.sh

      # Step 6: Integration verification
      - name: Integration verification
        run: |
          source /opt/conda/etc/profile.d/conda.sh
          conda activate py_3.10
          bash torch_npu/.ci/pytorch/integration_verify.sh

      # Step 7: Build summary
      - name: Build summary
        run: |
          echo "============================================"
          echo "  Build Summary"
          echo "============================================"
          echo "  Upstream repo:  ${{ inputs.upstream_repo }}"
          echo "  Upstream SHA:   ${{ inputs.upstream_sha }}"
          echo "  torch_npu repo: ${{ inputs.downstream_repo }}"
          echo "  Build mode:     ${{ inputs.build-mode }}"
          echo "  Status:         SUCCESS"
          echo "============================================"
