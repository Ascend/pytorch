name: Build PyTorch and torch_npu

on:
  workflow_call:
    inputs:
      upstream_repo:
        required: true
        type: string
        description: The upstream repository full name (owner/repo)
      upstream_sha:
        required: true
        type: string
        description: The upstream commit SHA to build
      upstream_fork_repo:
        required: false
        type: string
        default: ''
        description: The fork repository full name for PR from fork (owner/repo)
      downstream_repo:
        required: true
        type: string
        description: The downstream repository full name (owner/repo)

jobs:
  build:
    runs-on: linux-aarch64-a3-16
    defaults:
      run:
        shell: bash
    container:
      image: quay.io/kerer/pytorch:torch-npu-test-aarch64-cann-a3-py3.10-torch-nightly
      options: --network host
    env:
      MAX_JOBS: 128
      USE_CUDA: 0
      USE_XNNPACK: 0
      _GLIBCXX_USE_CXX11_ABI: 1
      BUILD_IGNORE_SVE_UNAVAILABLE: 1
      BUILD_WITHOUT_SHA: 1
      PIP_INDEX_URL: https://mirrors.huaweicloud.com/repository/pypi/simple
    steps:
      # Step 0: Setup cache directories and ccache
      - name: Setup cache directories
        run: |
          mkdir -p ~/.cache/pip
          mkdir -p ~/.cache/ccache
          chmod -R 777 ~/.cache

      - name: Install ccache
        run: |
          if ! command -v ccache &> /dev/null; then
            echo "Installing ccache..."
            apt-get update -qq && apt-get install -y -qq ccache
          fi
          ccache --version

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-arm-py3.10-torch-source-build
          restore-keys: |
            pip-arm-py3.10-torch-source-build
            pip-arm-py3.10-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-arm-py3.10-${{ github.run_id }}
          restore-keys: |
            ccache-arm-py3.10-

      # Step 1: Checkout upstream PyTorch PR code
      # Use fork repo if available (PR from fork), otherwise use upstream repo
      - name: Checkout upstream PyTorch PR
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.upstream_fork_repo != '' && inputs.upstream_fork_repo || inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
          fetch-depth: 0
          submodules: recursive
          path: pytorch

      # Step 2: Build and install PyTorch
      # pip install -e . = cmake configure + build + editable install
      - name: Build and install PyTorch
        id: build_pytorch
        working-directory: pytorch
        run: |
          echo "============================================"
          echo "Building PyTorch from upstream PR..."
          if [ -n "${{ inputs.upstream_fork_repo }}" ]; then
            echo "Fork Repository: ${{ inputs.upstream_fork_repo }}"
          else
            echo "Repository: ${{ inputs.upstream_repo }}"
          fi
          echo "Commit SHA: ${{ inputs.upstream_sha }}"
          echo "MAX_JOBS: ${MAX_JOBS}"
          echo "============================================"

          # Configure ccache via CMake launcher vars (NOT CC/CXX wrapper).
          # CC="ccache gcc" breaks .S assembly compilation (qnnpack confu
          # loses the "gcc" part and passes -D flags directly to ccache).
          if command -v ccache &> /dev/null; then
            echo "ccache found, enabling compiler cache"
            ccache -M 10G
            ccache -z || true
            export CMAKE_C_COMPILER_LAUNCHER=ccache
            export CMAKE_CXX_COMPILER_LAUNCHER=ccache
            export CCACHE_DIR=~/.cache/ccache
            export CCACHE_COMPRESS=1
            export CCACHE_MAXSIZE=10G
            export CCACHE_BASEDIR="${PWD}"
            USE_CCACHE=1
          else
            echo "ccache not found, building without cache"
            USE_CCACHE=0
          fi

          pip install -r requirements.txt
          python -m pip install --no-build-isolation -v -e . 2>&1 | tee /tmp/build-pytorch.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ "${USE_CCACHE}" = "1" ]; then
            echo "--- ccache statistics (PyTorch) ---"
            ccache -s
          fi

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "PyTorch build failed!"
            exit ${BUILD_STATUS}
          fi

          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"

      # Step 3: Checkout downstream torch_npu master
      - name: Checkout downstream repo (torch_npu)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.downstream_repo }}
          ref: master
          submodules: recursive
          path: torch_npu

      # Step 4: Build and install torch_npu
      # NOTE: Intentionally do NOT use 'pip install -r requirements.txt' from torch_npu,
      # because that file pins a specific torch version which would overwrite the
      # source-built PyTorch from the upstream PR.
      - name: Build and install torch_npu
        id: build_torchnpu
        working-directory: torch_npu
        run: |
          echo "============================================"
          echo "Building torch_npu from downstream master..."
          echo "Repository: ${{ inputs.downstream_repo }}"
          echo "Branch: master"
          echo "============================================"

          # Configure ccache via CMake launcher vars (NOT CC/CXX wrapper).
          if command -v ccache &> /dev/null; then
            echo "ccache found, enabling compiler cache"
            ccache -M 10G
            ccache -z || true
            export CMAKE_C_COMPILER_LAUNCHER=ccache
            export CMAKE_CXX_COMPILER_LAUNCHER=ccache
            export CCACHE_DIR=~/.cache/ccache
            export CCACHE_COMPRESS=1
            export CCACHE_MAXSIZE=10G
            export CCACHE_BASEDIR="${PWD}"
            USE_CCACHE=1
          else
            echo "ccache not found, building without cache"
            USE_CCACHE=0
          fi

          # Pre-update AOTInductor C shim headers for version skew.
          # When the source-built PyTorch version (e.g. 2.13.0a0) is newer
          # than what torch_npu master's committed headers expect, the
          # code generator adds TORCH_FEATURE_VERSION guards that differ
          # from the checked-in files, causing a hard failure.  Run the
          # codegen with --update_aoti_c_shim first to bring headers in
          # sync before the full build re-runs codegen for verification.
          TORCH_VER=$(python -c "import torch; print(torch.__version__)")
          TORCH_MAJOR=$(echo "${TORCH_VER}" | cut -d. -f1)
          TORCH_MINOR=$(echo "${TORCH_VER}" | cut -d. -f2)
          PYTORCH_DIR="v${TORCH_MAJOR}r${TORCH_MINOR}"
          echo "Pre-updating AOTInductor C shim headers (PyTorch ${TORCH_VER}, dir ${PYTORCH_DIR})"
          python -m torchnpugen.gen_backend_stubs \
            --output_dir=torch_npu/csrc/aten \
            --source_yaml=torch_npu/csrc/aten/npu_native_functions.yaml \
            --impl_path=torch_npu/csrc/aten \
            --op_plugin_impl_path=third_party/op-plugin/op_plugin/ops \
            --op_plugin_yaml_path="third_party/op-plugin/op_plugin/config/${PYTORCH_DIR}/op_plugin_functions.yaml" \
            --update_aoti_c_shim

          bash ci/build.sh --python=3.10 --disable_torchair --disable_rpc 2>&1 | tee /tmp/build-torchnpu.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ "${USE_CCACHE}" = "1" ]; then
            echo "--- ccache statistics (torch_npu) ---"
            ccache -s
          fi

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "torch_npu build failed!"
            exit ${BUILD_STATUS}
          fi

          pip install dist/torch_npu*.whl

      # Step 5: Verify both packages import successfully
      - name: Verify installation
        run: |
          echo "============================================"
          echo "Verifying PyTorch and torch_npu imports..."
          echo "============================================"
          python -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'PyTorch path: {torch.__file__}')"
          python -c "import torch_npu; print(f'torch_npu version: {torch_npu.__version__}'); print(f'torch_npu path: {torch_npu.__file__}')"
          echo ""
          echo "Both PyTorch and torch_npu imported successfully."

      # Step 6: Upload build logs (always, for debugging failures)
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            /tmp/build-pytorch.log
            /tmp/build-torchnpu.log
          if-no-files-found: warn

      # Step 7: Summary
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "             Build Summary"
          echo "============================================"
          if [ -n "${{ inputs.upstream_fork_repo }}" ]; then
            echo "PyTorch fork PR : ${{ inputs.upstream_fork_repo }}"
          else
            echo "PyTorch upstream: ${{ inputs.upstream_repo }}"
          fi
          echo "PyTorch commit  : ${{ inputs.upstream_sha }}"
          echo "torch_npu repo  : ${{ inputs.downstream_repo }}"
          echo "Max jobs        : ${MAX_JOBS}"
          if command -v ccache &> /dev/null; then
            echo "--- ccache summary ---"
            ccache -s
          fi
          echo "============================================"
