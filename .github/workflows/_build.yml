name: Build PyTorch and torch_npu

on:
  workflow_call:
    inputs:
      upstream_repo:
        required: true
        type: string
        description: The upstream repository full name (owner/repo)
      upstream_sha:
        required: true
        type: string
        description: The upstream commit SHA to build
      upstream_fork_repo:
        required: false
        type: string
        default: ''
        description: The fork repository full name for PR from fork (owner/repo)
      torch_npu_repo:
        required: true
        type: string
        description: The torch_npu repository full name (owner/repo)
      torch_npu_ref:
        required: false
        type: string
        default: 'master'
        description: The torch_npu repository branch, tag, or SHA to build

jobs:
  # ======================================================================
  # Job 1: Fetch PyTorch source on GitHub free runner (no proxy needed)
  # ======================================================================
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout upstream PyTorch
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.upstream_fork_repo != '' && inputs.upstream_fork_repo || inputs.upstream_repo }}
          ref: ${{ inputs.upstream_sha }}
          fetch-depth: 1
          submodules: false
          path: pytorch

      - name: Init submodules (shallow)
        working-directory: pytorch
        run: |
          git submodule update --init --recursive --depth=1 --jobs=$(nproc)

      - name: Package PyTorch source
        run: |
          echo "Packaging pytorch/ into pytorch-source.tar.gz ..."
          tar -czf pytorch-source.tar.gz pytorch/
          echo "Package size: $(du -h pytorch-source.tar.gz | cut -f1)"

      - name: Authenticate to Huawei Cloud
        uses: huaweicloud/auth-action@v1.1.0
        with:
          access_key_id: ${{ secrets.ACCESSKEY }}
          secret_access_key: ${{ secrets.SECRETACCESSKEY }}
          region: cn-north-4

      - name: Upload PyTorch source to OBS
        uses: huaweicloud/obs-helper@v1.0.1
        with:
          region: cn-north-4
          bucket_name: pytorch-cache
          local_file_path: ./pytorch-source.tar.gz
          obs_file_path: 7day-cache/pytorch-source-${{ github.run_id }}.tar.gz
          operation_type: upload

  # ======================================================================
  # Job 2: Build PyTorch + torch_npu on self-hosted ARM64 runner
  # ======================================================================
  build:
    needs: fetch
    runs-on: linux-aarch64-a3-16
    defaults:
      run:
        shell: bash
    container:
      image: quay.io/kerer/pytorch:torch-npu-test-aarch64-cann-a3-py3.10-torch-nightly
      options: --network host
    env:
      MAX_JOBS: 128
      USE_CUDA: 0
      USE_XNNPACK: 0
      _GLIBCXX_USE_CXX11_ABI: 1
      BUILD_IGNORE_SVE_UNAVAILABLE: 1
      BUILD_WITHOUT_SHA: 1
      PIP_INDEX_URL: https://mirrors.huaweicloud.com/repository/pypi/simple
    steps:
      # Step 1: Download and extract pre-fetched PyTorch source
      - name: Authenticate to Huawei Cloud
        uses: huaweicloud/auth-action@v1.1.0
        with:
          access_key_id: ${{ secrets.ACCESSKEY }}
          secret_access_key: ${{ secrets.SECRETACCESSKEY }}
          region: cn-north-4

      - name: Download PyTorch source from OBS
        uses: huaweicloud/obs-helper@v1.0.1
        with:
          region: cn-north-4
          bucket_name: pytorch-cache
          local_file_path: ./pytorch-source.tar.gz
          obs_file_path: 7day-cache/pytorch-source-${{ github.run_id }}.tar.gz
          operation_type: download

      - name: Extract PyTorch source
        run: |
          tar -xzf pytorch-source.tar.gz
          rm pytorch-source.tar.gz
          echo "PyTorch source extracted: $(du -sh pytorch/ | cut -f1)"

      # Step 2: Build and install PyTorch
      - name: Build and install PyTorch
        id: build_pytorch
        working-directory: pytorch
        run: |
          echo "============================================"
          echo "Building PyTorch from upstream PR..."
          if [ -n "${{ inputs.upstream_fork_repo }}" ]; then
            echo "Fork Repository: ${{ inputs.upstream_fork_repo }}"
          else
            echo "Repository: ${{ inputs.upstream_repo }}"
          fi
          echo "Commit SHA: ${{ inputs.upstream_sha }}"
          echo "MAX_JOBS: ${MAX_JOBS}"
          echo "============================================"

          pip install -r requirements.txt

          # Build wheel first, then install from it.
          # This produces an artifact we can upload for downstream use.
          mkdir -p /tmp/wheels
          set +o pipefail
          python -m pip wheel --no-build-isolation -w /tmp/wheels/ . 2>&1 | tee /tmp/build-pytorch.log
          BUILD_STATUS=${PIPESTATUS[0]}
          set -o pipefail

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "PyTorch build failed!"
            exit ${BUILD_STATUS}
          fi

          pip install /tmp/wheels/torch*.whl

          # Must NOT run from pytorch/ source dir: Python would find
          # the local torch/ source tree instead of the installed package.
          cd /tmp
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          cd "${GITHUB_WORKSPACE}"

      # Step 3: Checkout downstream torch_npu
      - name: Checkout downstream repo (torch_npu)
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.torch_npu_repo }}
          ref: ${{ inputs.torch_npu_ref }}
          fetch-depth: 1
          submodules: false
          path: torch_npu

      - name: Init submodules (shallow)
        working-directory: torch_npu
        run: |
          git submodule update --init --recursive --depth=1 --jobs=$(nproc)

      # Step 3.5: Diagnose installed PyTorch for Dimname references
      - name: "[Diagnostic] Check installed torchgen for Dimname"
        working-directory: /tmp
        run: |
          echo "=== Checking installed torchgen for Dimname ==="
          python -c "
          import torchgen, os, sys
          d = os.path.dirname(torchgen.__file__)
          yaml_path = os.path.join(d, 'packaged/ATen/native/native_functions.yaml')
          print(f'Checking: {yaml_path}')
          if not os.path.exists(yaml_path):
              print('ERROR: native_functions.yaml not found!')
              sys.exit(1)
          with open(yaml_path) as f:
              c = f.read()
          cnt = c.count('Dimname')
          print(f'native_functions.yaml: {cnt} Dimname reference(s)')
          if cnt > 0:
              for i, l in enumerate(c.split('\n')):
                  if 'Dimname' in l:
                      print(f'  line {i}: {l.strip()[:150]}')
              print('FATAL: Stale native_functions.yaml with Dimname detected!')
              sys.exit(1)
          else:
              print('OK: native_functions.yaml is clean')
          "

          echo ""
          echo "=== Checking model.py BaseTy ==="
          python -c "
          import torchgen.model as m
          has = 'Dimname' in [e.name for e in m.BaseTy]
          print(f'model.py BaseTy has Dimname member: {has}')
          import sys
          if has:
              print('FATAL: model.py still has Dimname in BaseTy!')
              sys.exit(1)
          else:
              print('OK: model.py BaseTy is clean')
          "

          echo ""
          echo "=== Checking tags.yaml ==="
          python -c "
          import torchgen, os
          d = os.path.dirname(torchgen.__file__)
          tags_path = os.path.join(d, 'packaged/ATen/native/tags.yaml')
          print(f'Checking: {tags_path}')
          with open(tags_path) as f:
              c = f.read()
          cnt = c.count('Dimname')
          print(f'tags.yaml: {cnt} Dimname reference(s)')
          if cnt > 0:
              print('WARNING: tags.yaml has Dimname refs!')
          else:
              print('OK: tags.yaml is clean')
          "

      # Step 4: Build and install torch_npu
      # NOTE: Intentionally do NOT use 'pip install -r requirements.txt' from torch_npu,
      # because that file pins a specific torch version which would overwrite the
      # source-built PyTorch from the upstream PR.
      - name: Build and install torch_npu
        id: build_torchnpu
        working-directory: torch_npu
        run: |
          echo "============================================"
          echo "Building torch_npu..."
          echo "Repository: ${{ inputs.torch_npu_repo }}"
          echo "Ref: ${{ inputs.torch_npu_ref }}"
          echo "============================================"

          set +o pipefail
          bash ci/build.sh --python=3.10 --disable_torchair --disable_rpc 2>&1 | tee /tmp/build-torchnpu.log
          BUILD_STATUS=${PIPESTATUS[0]}
          set -o pipefail

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "torch_npu build failed!"
            exit ${BUILD_STATUS}
          fi

          pip install dist/torch_npu*.whl
          cp dist/torch_npu*.whl /tmp/wheels/

      # Step 5: Upload wheel artifacts
      - name: Upload wheel artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ github.run_number }}
          path: /tmp/wheels/*.whl
          retention-days: 7

      # Step 6: Verify NPU environment and imports
      - name: Verify NPU device
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          echo "=== NPU Device Information ==="
          npu-smi info
          echo "=== End of NPU Device Information ==="

      - name: Verify NPU availability
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true

          python -c "
          import torch
          print(f'torch: {torch.__version__}')
          import torch_npu
          print(f'torch_npu: {torch_npu.__version__}')
          print(f'NPU available: {torch.npu.is_available()}')
          print(f'NPU count: {torch.npu.device_count()}')
          "

      # Step 7: Upload build artifacts (always, for debugging failures)
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            /tmp/build-pytorch.log
            /tmp/build-torchnpu.log
            torch_npu/torch_npu/csrc/inductor/aoti_torch/generated/c_shim_npu.h
          if-no-files-found: warn

      # Step 8: Summary
      - name: Summary
        if: always()
        run: |
          echo "============================================"
          echo "             Build Summary"
          echo "============================================"
          if [ -n "${{ inputs.upstream_fork_repo }}" ]; then
            echo "PyTorch fork PR : ${{ inputs.upstream_fork_repo }}"
          else
            echo "PyTorch upstream: ${{ inputs.upstream_repo }}"
          fi
          echo "PyTorch commit  : ${{ inputs.upstream_sha }}"
          echo "torch_npu repo  : ${{ inputs.torch_npu_repo }}"
          echo "Max jobs        : ${MAX_JOBS}"
          echo "============================================"
