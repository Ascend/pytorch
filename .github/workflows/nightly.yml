name: Nightly Build Integration

on:
  schedule:
    # 每天凌晨 2:00 UTC+8 运行 (UTC 18:00)
    - cron: '0 18 * * *'
  pull_request:
    branches:
      - master
      - master_nightly_build
    paths:
      - '.github/workflows/_build.yml'
      - '.github/workflows/_test.yml'
      - '.github/workflows/nightly.yml'
  workflow_dispatch:
    inputs:
      pytorch_branch:
        description: 'PyTorch branch to build'
        required: true
        type: string
        default: 'main'
      python_version:
        description: 'Python version'
        required: true
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
        default: '3.11'
      docker_image:
        description: 'Docker image for build and test'
        required: true
        type: string
        default: 'quay.io/kerer/pytorch:manylinux-cann9.0.0-beta.2-20260428'
      skip_build:
        description: 'Skip build (use cached artifacts)'
        required: false
        type: boolean
        default: false

jobs:
  # ==================== 编译阶段 ====================
  build:
    name: Build PyTorch and torch_npu
    if: ${{ inputs.skip_build != true }}
    uses: ./.github/workflows/_build.yml
    with:
      pytorch_branch: ${{ inputs.pytorch_branch || 'main' }}
      python_version: ${{ inputs.python_version || '3.11' }}
      docker_image: ${{ inputs.docker_image || 'quay.io/kerer/pytorch:manylinux-cann9.0.0-beta.2-20260428' }}

  # ==================== 测试阶段 ====================
  test:
    name: Test torch_npu wheels
    needs: build
    if: always() && needs.build.result == 'success'
    uses: ./.github/workflows/_test.yml
    with:
      python_version: ${{ inputs.python_version || '3.11' }}
      docker_image: ${{ inputs.docker_image || 'quay.io/kerer/pytorch:manylinux-cann9.0.0-beta.2-20260428' }}

  # ==================== 报告阶段 ====================
  report:
    name: Build Report
    needs: [build, test]
    if: success() || (needs.build.result == 'skipped' && inputs.skip_build == true)
    runs-on: ubuntu-latest

    steps:
      - name: Generate build report
        run: |
          echo "## Nightly Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${BUILD_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${TEST_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- PyTorch branch: ${PYTORCH_BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- Python version: ${PYTHON_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker image: ${DOCKER_IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${TRIGGER_TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "- Run number: ${RUN_NUMBER}" >> $GITHUB_STEP_SUMMARY
        env:
          BUILD_STATUS: ${{ needs.build.result == 'success' && '✅ Success' || needs.build.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}
          TEST_STATUS: ${{ needs.test.result == 'success' && '✅ Success' || needs.test.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}
          PYTORCH_BRANCH: ${{ inputs.pytorch_branch || 'main' }}
          PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}
          DOCKER_IMAGE: ${{ inputs.docker_image || 'quay.io/kerer/pytorch:manylinux-cann9.0.0-beta.2-20260428' }}
          TRIGGER_TYPE: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}