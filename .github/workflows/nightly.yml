name: Nightly Build and Test

on:
  push:
    branches:
      - ci-test
    paths:
      - '.github/workflows/**'
      - '.github/config/**'
      - '.github/scripts/**'
  workflow_dispatch:
    inputs:
      distributed_shards:
        description: 'Number of parallel machines for distributed tests'
        required: false
        default: '5'
        type: string
      regular_shards:
        description: 'Number of parallel machines for regular tests'
        required: false
        default: '5'
        type: string

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    secrets: inherit
    with:
      upstream_repo: pytorch/pytorch
      upstream_ref: main
      torch_npu_repo: Ascend/pytorch
      torch_npu_ref: master
      report_to_upstream: false

  test:
    needs: build
    uses: ./.github/workflows/_test.yml
    secrets: inherit
    with:
      resolved_short: ${{ needs.build.outputs.resolved_short }}
      case_paths_config: .github/config/test_whitelist.yml
      distributed_shards: ${{ inputs.distributed_shards || '5' }}
      regular_shards: ${{ inputs.regular_shards || '5' }}
      report_to_upstream: false
