name: Torch NPU Upstream Build

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
        description: Python version to use for building
      docker_image:
        required: true
        type: string
        description: Docker image to use for building
      torch_npu_wheel_artifact:
        required: true
        type: string
        description: Name of the artifact to upload the wheel
      max_jobs:
        required: false
        type: string
        default: '40'
        description: Maximum number of parallel build jobs
      pytorch_commit:
        required: false
        type: string
        default: ''
        description: PyTorch commit to compile if dev env is missing
      torch_npu_ref:
        required: false
        type: string
        default: 'master'
        description: Branch/ref of ascend-pytorch to checkout for building torch_npu
    outputs:
      wheel_name:
        description: Name of the built wheel file
        value: ${{ jobs.build_torch_npu.outputs.wheel }}
      build_status:
        description: Build status (0 for success, non-zero for failure)
        value: ${{ jobs.build_torch_npu.outputs.status }}


jobs:
  build_torch_npu:
    runs-on: linux-aarch64-a3-2
    container:
      image: ${{ inputs.docker_image }}
      options: --user root
    outputs:
      wheel: ${{ steps.build.outputs.wheel }}
      status: ${{ steps.build.outputs.status }}
    env:
      DOCKER_IMAGE: ${{ inputs.docker_image }}
      PYTHON_VERSION: ${{ inputs.python_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.torch_npu_ref != '' && inputs.torch_npu_ref || (github.ref_name == 'master' && 'v2.7.1' || github.ref) }}
          fetch-depth: 1
          submodules: true

      - name: Check image dependencies
        id: check_dev_env
        run: |
          echo "=== Python Version ==="
          python${{ inputs.python_version }} --version
          pip${{ inputs.python_version }} --version

          echo "=== CMake Version ==="
          cmake3 --version | head -1

          echo "=== GCC Version ==="
          gcc --version | head -1

          echo "=== ccache Version ==="
          ccache --version | head -1

          echo "=== nproc ==="
          nproc

          echo "=== PyTorch Version ==="
          python${{ inputs.python_version }} -c "import torch; print(torch.__version__)"

          echo "=== PyTorch Dev Environment ==="
          TORCH_DIR=$(python${{ inputs.python_version }} -c "import torch, os; print(os.path.dirname(os.path.realpath(torch.__file__)))")
          echo "Torch dir: ${TORCH_DIR}"

          DEV_ENV_OK="true"

          if [ -d "${TORCH_DIR}/include" ] && [ -f "${TORCH_DIR}/include/torch/extension.h" ]; then
            echo "  include/torch/extension.h  OK"
          else
            echo "  include/torch/extension.h  MISSING"
            DEV_ENV_OK="false"
          fi

          if [ -d "${TORCH_DIR}/lib" ] && [ "$(find ${TORCH_DIR}/lib -maxdepth 1 -name 'libtorch*' 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "  lib/  OK"
          else
            echo "  lib/  MISSING"
            DEV_ENV_OK="false"
          fi

          if [ -f "${TORCH_DIR}/share/cmake/Torch/TorchConfig.cmake" ]; then
            echo "  cmake config  OK"
          else
            echo "  cmake config  MISSING"
            DEV_ENV_OK="false"
          fi

          echo "dev_env_ok=${DEV_ENV_OK}" >> $GITHUB_OUTPUT
          echo "torch_dir=${TORCH_DIR}" >> $GITHUB_OUTPUT

      - name: Build PyTorch from source (dev env missing)
        if: steps.check_dev_env.outputs.dev_env_ok == 'false' && inputs.pytorch_commit != ''
        run: |
          echo "=== PyTorch dev environment is missing, building from source ==="
          echo "PyTorch commit: ${{ inputs.pytorch_commit }}"

          git clone --depth 1 --branch master https://github.com/pytorch/pytorch.git /tmp/pytorch-src
          cd /tmp/pytorch-src
          git fetch origin ${{ inputs.pytorch_commit }}
          git checkout ${{ inputs.pytorch_commit }}
          git submodule sync
          git submodule update --init --recursive --depth 1

          echo "=== Building PyTorch (this may take a while) ==="
          export MAX_JOBS=${{ inputs.max_jobs }}
          python${{ inputs.python_version }} setup.py develop 2>&1 | tee /tmp/build_pytorch.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "PyTorch build failed!"
            exit ${BUILD_STATUS}
          fi

          echo "=== PyTorch build complete ==="
          python${{ inputs.python_version }} -c "import torch; print(torch.__version__)"

      - name: Build PyTorch from source (dev env missing, no commit)
        if: steps.check_dev_env.outputs.dev_env_ok == 'false' && inputs.pytorch_commit == ''
        run: |
          echo "=== PyTorch dev environment is missing, building from source (default branch) ==="

          git clone --depth 1 --branch main https://github.com/pytorch/pytorch.git /tmp/pytorch-src
          cd /tmp/pytorch-src
          git submodule sync
          git submodule update --init --recursive --depth 1

          echo "=== Building PyTorch (this may take a while) ==="
          export MAX_JOBS=${{ inputs.max_jobs }}
          python${{ inputs.python_version }} setup.py develop 2>&1 | tee /tmp/build_pytorch.log
          BUILD_STATUS=${PIPESTATUS[0]}

          if [ ${BUILD_STATUS} -ne 0 ]; then
            echo "PyTorch build failed!"
            exit ${BUILD_STATUS}
          fi

          echo "=== PyTorch build complete ==="
          python${{ inputs.python_version }} -c "import torch; print(torch.__version__)"

      - name: Collect repository metadata
        id: repo_meta
        run: |
          COMMIT=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_DATE=$(git log -1 --format='%ci')

          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "commit_short=${COMMIT_SHORT}" >> $GITHUB_OUTPUT
          echo "commit_date=${COMMIT_DATE}" >> $GITHUB_OUTPUT

      - name: Collect toolchain metadata
        id: toolchain_meta
        run: |
          CMAKE_VERSION=$(cmake3 --version | head -1)
          GCC_VERSION=$(gcc --version | head -1)
          TORCH_VERSION=$(python${{ inputs.python_version }} -c "import torch; print(torch.__version__)")

          echo "cmake_version=${CMAKE_VERSION}" >> $GITHUB_OUTPUT
          echo "gcc_version=${GCC_VERSION}" >> $GITHUB_OUTPUT
          echo "torch_version=${TORCH_VERSION}" >> $GITHUB_OUTPUT

      - name: Setup ccache directory
        run: |
          mkdir -p /github/home/.cache/ccache
          chmod -R 777 /github/home/.cache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/ccache
          key: ccache-py${{ inputs.python_version }}-${{ github.sha }}
          restore-keys: |
            ccache-py${{ inputs.python_version }}-

      - name: Build torch_npu wheel
        id: build
        run: |
          PYTHON=python${{ inputs.python_version }}

          ccache -M 10G
          ccache -z || true
          export CC="ccache gcc"
          export CXX="ccache g++"
          export CCACHE_DIR=/github/home/.cache/ccache
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=10G
          export CCACHE_BASEDIR="${PWD}"

          echo "nproc value: $(nproc)"
          echo "MAX_JOBS: ${{ inputs.max_jobs }}"
          export MAX_JOBS=${{ inputs.max_jobs }}
          export DISABLE_INSTALL_TORCHAIR=FALSE
          export BUILD_WITHOUT_SHA=1

          bash ci/build.sh --python=${{ inputs.python_version }} 2>&1 | tee /tmp/build_torch_npu.log
          BUILD_STATUS=${PIPESTATUS[0]}

          CCACHE_STATS=$(ccache -s 2>&1 | grep -iE "cacheable calls|hits:|misses:|cache size" | tr '\n' ' ')
          echo "ccache_stats=${CCACHE_STATS}" >> $GITHUB_OUTPUT
          ccache -s 2>&1

          echo "status=${BUILD_STATUS}" >> $GITHUB_OUTPUT

          if [ ${BUILD_STATUS} -eq 0 ]; then
            WHL=$(ls dist/*.whl 2>/dev/null | head -1)
            echo "wheel=${WHL}" >> $GITHUB_OUTPUT
            echo "Build succeeded: ${WHL}"
          fi

          exit ${BUILD_STATUS}

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-torch-npu
          path: /tmp/build_torch_npu.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload built torch_npu wheel
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.torch_npu_wheel_artifact }}
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 60

      - name: Build summary
        if: always()
        run: |
          BUILD_STATUS="${{ steps.build.outputs.status }}"
          if [ "${BUILD_STATUS}" = "0" ]; then
            BUILD_RESULT="SUCCESS"
          else
            BUILD_RESULT="FAILED"
          fi

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## torch_npu Source Build

          | Item | Value |
          |------|-------|
          | Build time | $(date -u '+%Y-%m-%d %H:%M UTC') |
          | Docker image | \`${{ env.DOCKER_IMAGE }}\` |
          | CMake | \`${{ steps.toolchain_meta.outputs.cmake_version }}\` |
          | GCC | \`${{ steps.toolchain_meta.outputs.gcc_version }}\` |
          | Source commit | [\`${{ steps.repo_meta.outputs.commit_short }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ steps.repo_meta.outputs.commit }}) |
          | Commit time | ${{ steps.repo_meta.outputs.commit_date }} |
          | PyTorch | \`${{ steps.toolchain_meta.outputs.torch_version }}\` |
          | ccache | ${{ steps.build.outputs.ccache_stats || 'N/A' }} |
          | Build result | ${BUILD_RESULT} |

          $( [ "${BUILD_STATUS}" = "0" ] && echo "> Wheel: \`${{ steps.build.outputs.wheel }}\`" || echo "> See the build-logs-torch-npu artifact for failure details." )
          EOF
