name: PyTorch NPU Full Test (v2.7.1 - Aligned with PyTorch CI)

on:
  push:
    paths:
      - '.github/workflows/npu-full-test.yml'
      - '.github/workflows/_build-torch-npu.yml'
      - '.github/scripts/resolve_whitelist.py'
      - '.github/scripts/pytest_disabled_testcases_plugin.py'
      - '.ci/npu/test.sh'
      - 'test_upsteam/**'
  pull_request:
    paths:
      - '.github/workflows/npu-full-test.yml'
      - '.github/workflows/_build-torch-npu.yml'
      - '.github/scripts/resolve_whitelist.py'
      - '.github/scripts/pytest_disabled_testcases_plugin.py'
      - '.ci/npu/test.sh'
      - 'test_upsteam/**'
  schedule:
    - cron: '0 22 * * 1'
  workflow_dispatch:
    inputs:
      shard_start:
        description: 'Start shard number (default 1)'
        required: false
        default: '1'
        type: string
      shard_end:
        description: 'End shard number (default 50)'
        required: false
        default: '50'
        type: string
      run_distributed:
        description: 'Run distributed tests (separate job)'
        required: false
        default: true
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  PYTORCH_VERSION: '2.7.1'
  NUM_SHARDS: '50'
  NUM_PARALLEL_PROCS: '2'
  PREPARED_TEST_SRC_ARTIFACT: 'pytorch-test-src-v2.7.1-patched'
  TORCH_NPU_WHEEL_ARTIFACT: 'torch-npu-wheel-v2.7.1-source'
  DOCKER_IMAGE: 'swr.cn-north-4.myhuaweicloud.com/frameworkptadapter/pytorch_2.11.0_a2_aarch64_builder:20260331'
  RUNNER_TYPE: 'linux-aarch64-a3-2'

defaults:
  run:
    shell: bash

jobs:
  # ==========================================================================
  # Job 1: Prepare PyTorch test source (clone + patch)
  # ==========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.set_matrix.outputs.shard_matrix }}
      patch_count: ${{ steps.apply_patches.outputs.patch_count }}
      test_count: ${{ steps.resolve.outputs.test_count }}
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set shard matrix
        id: set_matrix
        run: |
          START=${{ inputs.shard_start || '1' }}
          END=${{ inputs.shard_end || '50' }}
          SHARDS=$(seq $START $END | tr '\n' ',' | sed 's/,$//')
          echo "shard_matrix=[${SHARDS}]" >> $GITHUB_OUTPUT

      - name: Clone PyTorch v${{ env.PYTORCH_VERSION }}
        run: |
          git clone --depth=1 --branch v${{ env.PYTORCH_VERSION }} \
            https://github.com/pytorch/pytorch.git pytorch-test-src

      - name: Copy test_upsteam and apply patches
        id: apply_patches
        run: |
          cp -r test_upsteam pytorch-test-src/
          cd pytorch-test-src/test_upsteam
          chmod +x apply_patch.sh
          ./apply_patch.sh 2>&1 | tee /tmp/patch.log
          PATCH_COUNT=$(grep -c "成功" /tmp/patch.log || echo "0")
          echo "patch_count=${PATCH_COUNT}" >> $GITHUB_OUTPUT

      - name: Dry-run resolve_whitelist
        id: resolve
        run: |
          pip install pyyaml
          python .github/scripts/resolve_whitelist.py \
            --case-paths-config pytorch-test-src/test_upsteam/case_paths_ci.yml \
            --crashed-files-config pytorch-test-src/test_upsteam/CRASHED.yml \
            --test-dir pytorch-test-src/test \
            --pytorch-root pytorch-test-src \
            --output-include /tmp/include.txt \
            --output-exclude /tmp/exclude.txt \
            --output-extra /tmp/extra.txt \
            --verbose
          echo "test_count=$(wc -l < /tmp/include.txt)" >> $GITHUB_OUTPUT

      - name: Package and upload test source
        run: tar -czf pytorch-test-src.tar.gz pytorch-test-src

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PREPARED_TEST_SRC_ARTIFACT }}
          path: pytorch-test-src.tar.gz
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prepare-logs
          path: /tmp/patch.log
          if-no-files-found: warn
          retention-days: 30

  # ==========================================================================
  # Job 2: Build torch_npu
  # ==========================================================================
  build_torch_npu:
    needs: prepare
    uses: ./.github/workflows/_build-torch-npu.yml
    with:
      python_version: '3.11'
      pytorch_version: '2.7.1'
      torch_npu_wheel_artifact: 'torch-npu-wheel-v2.7.1-source'
      max_jobs: '40'

  # ==========================================================================
  # Job 3: Re-upload wheel
  # ==========================================================================
  upload_torch_npu_wheel:
    needs: build_torch_npu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.TORCH_NPU_WHEEL_ARTIFACT }}
          path: torch-npu-wheel
      - uses: actions/upload-artifact@v4
        with:
          name: torch-npu-wheel-${{ env.PYTORCH_VERSION }}
          path: torch-npu-wheel/*.whl
          retention-days: 30

  # ==========================================================================
  # Job 4: Regular tests (sharded, N machines)
  # ==========================================================================
  test:
    needs: [prepare, upload_torch_npu_wheel]
    runs-on: linux-aarch64-a3-2
    container:
      image: swr.cn-north-4.myhuaweicloud.com/frameworkptadapter/pytorch_2.11.0_a2_aarch64_builder:20260331
      options: --user root
    strategy:
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shard_matrix) }}
      fail-fast: false
      max-parallel: 50

    steps:
      - name: Checkout ascend_pytorch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: ascend_pytorch

      - name: Setup cache
        run: mkdir -p /github/home/.cache/pip && chmod -R 777 /github/home/.cache

      - uses: actions/cache@v4
        with:
          path: /github/home/.cache/pip
          key: pip-arm-fulltest-py${{ env.PYTHON_VERSION }}-v${{ env.PYTORCH_VERSION }}
          restore-keys: pip-arm-fulltest-py${{ env.PYTHON_VERSION }}-

      - name: Download torch_npu wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TORCH_NPU_WHEEL_ARTIFACT }}
          path: torch-npu-wheel-artifact

      - name: Install PyTorch + torch_npu
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
          PIP=pip${{ env.PYTHON_VERSION }}
          $PIP uninstall -y torch torchvision || true
          $PIP install --upgrade pip
          $PIP install torch==${{ env.PYTORCH_VERSION }}
          $PIP install torch-npu-wheel-artifact/*.whl

      - name: Download and extract test source
        run: |
          wget -q ${{ needs.prepare.outputs.test_src_url || '' }} 2>/dev/null || true
        # Fallback to artifact download
      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.PREPARED_TEST_SRC_ARTIFACT }}
          path: prepared-test-src-artifact
      - run: tar -xzf prepared-test-src-artifact/pytorch-test-src.tar.gz

      - name: Verify NPU
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
          python${{ env.PYTHON_VERSION }} -c "
          import torch; import torch_npu
          print(f'NPU available: {torch.npu.is_available()}, count: {torch.npu.device_count()}')
          "

      - name: Install test dependencies
        run: |
          PIP=pip${{ env.PYTHON_VERSION }}
          cd pytorch-test-src
          $PIP install pytest pytest-timeout pytest-xdist hypothesis zstandard pyyaml
          $PIP install pytest-rerunfailures pytest-flakefinder
          $PIP install 'pytest-subtests==0.13.1' 'xdoctest==1.1.0' 'pulp>=2.9'
          [ -f requirements.txt ] && $PIP install -r requirements.txt || true

      - name: Run shard ${{ matrix.shard }}/${{ env.NUM_SHARDS }}
        id: run_test
        env:
          SHARD_NUMBER: ${{ matrix.shard }}
          NUM_TEST_SHARDS: ${{ env.NUM_SHARDS }}
          NUM_PARALLEL_PROCS: ${{ env.NUM_PARALLEL_PROCS }}
          PYTORCH_TEST_SRC: ${{ github.workspace }}/pytorch-test-src
          ASCEND_PYTORCH_DIR: ${{ github.workspace }}/ascend_pytorch
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
          RUN_MODE: regular
        run: |
          chmod +x ascend_pytorch/.ci/npu/test.sh
          set +e
          ascend_pytorch/.ci/npu/test.sh 2>&1 | tee /tmp/test_shard_${{ matrix.shard }}.log
          TEST_STATUS=${PIPESTATUS[0]}
          set -e
          echo "status=${TEST_STATUS}" >> $GITHUB_OUTPUT
          exit ${TEST_STATUS}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-shard-${{ matrix.shard }}
          path: pytorch-test-src/test/test-reports/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-shard-${{ matrix.shard }}
          path: |
            /tmp/test_shard_${{ matrix.shard }}.log
            /tmp/run_test_phase*.log
            /tmp/include_tests.txt
            /tmp/exclude_tests.txt
            /tmp/extra_pytest_tests.txt
          if-no-files-found: warn

  # ==========================================================================
  # Job 5: Distributed tests (single machine, RUN_MODE=distributed)
  # ==========================================================================
  distributed_test:
    needs: [prepare, upload_torch_npu_wheel]
    if: ${{ inputs.run_distributed != false }}
    runs-on: linux-aarch64-a3-2
    container:
      image: swr.cn-north-4.myhuaweicloud.com/frameworkptadapter/pytorch_2.11.0_a2_aarch64_builder:20260331
      options: --user root

    steps:
      - name: Checkout ascend_pytorch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: ascend_pytorch

      - name: Setup cache
        run: mkdir -p /github/home/.cache/pip && chmod -R 777 /github/home/.cache

      - name: Download torch_npu wheel
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.TORCH_NPU_WHEEL_ARTIFACT }}
          path: torch-npu-wheel-artifact

      - name: Install PyTorch + torch_npu
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
          PIP=pip${{ env.PYTHON_VERSION }}
          $PIP uninstall -y torch torchvision || true
          $PIP install --upgrade pip
          $PIP install torch==${{ env.PYTORCH_VERSION }}
          $PIP install torch-npu-wheel-artifact/*.whl

      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.PREPARED_TEST_SRC_ARTIFACT }}
          path: prepared-test-src-artifact
      - run: tar -xzf prepared-test-src-artifact/pytorch-test-src.tar.gz

      - name: Verify NPU
        run: |
          source /usr/local/Ascend/cann/set_env.sh 2>/dev/null || true
          source /usr/local/Ascend/nnal/atb/set_env.sh 2>/dev/null || true
          python${{ env.PYTHON_VERSION }} -c "
          import torch; import torch_npu
          print(f'NPU available: {torch.npu.is_available()}, count: {torch.npu.device_count()}')
          "

      - name: Install test dependencies
        run: |
          PIP=pip${{ env.PYTHON_VERSION }}
          cd pytorch-test-src
          $PIP install pytest pytest-timeout pytest-xdist hypothesis zstandard pyyaml
          $PIP install pytest-rerunfailures pytest-flakefinder
          $PIP install 'pytest-subtests==0.13.1' 'xdoctest==1.1.0' 'pulp>=2.9'
          [ -f requirements.txt ] && $PIP install -r requirements.txt || true

      - name: Run distributed tests
        id: run_distributed
        env:
          SHARD_NUMBER: 1
          NUM_TEST_SHARDS: 1
          NUM_PARALLEL_PROCS: 1
          PYTORCH_TEST_SRC: ${{ github.workspace }}/pytorch-test-src
          ASCEND_PYTORCH_DIR: ${{ github.workspace }}/ascend_pytorch
          PYTHON_VERSION: ${{ env.PYTHON_VERSION }}
          RUN_MODE: distributed
        run: |
          chmod +x ascend_pytorch/.ci/npu/test.sh
          set +e
          ascend_pytorch/.ci/npu/test.sh 2>&1 | tee /tmp/test_distributed.log
          TEST_STATUS=${PIPESTATUS[0]}
          set -e
          echo "status=${TEST_STATUS}" >> $GITHUB_OUTPUT
          exit ${TEST_STATUS}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-distributed
          path: pytorch-test-src/test/test-reports/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-distributed
          path: /tmp/test_distributed.log
          if-no-files-found: warn

  # ==========================================================================
  # Job 6: Report
  # ==========================================================================
  report:
    needs: [prepare, build_torch_npu, upload_torch_npu_wheel, test, distributed_test]
    if: always() && needs.prepare.result == 'success' && needs.build_torch_npu.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: test-reports-*
          path: all-test-reports
          merge-multiple: true

      - name: Generate summary
        run: |
          pip install junitparser
          python3 << 'PYEOF'
          import os, json
          from pathlib import Path
          from junitparser import JUnitXml

          reports = Path(os.environ.get("REPORTS_DIR", "all-test-reports"))
          total = passed = failed = skipped = errors = 0
          failed_list = []

          for xml in reports.rglob("*.xml"):
              try:
                  for case in JUnitXml.fromfile(str(xml)):
                      total += 1
                      r = case.result
                      if r is None:
                          passed += 1
                      elif r._tag == "failure":
                          failed += 1
                          failed_list.append(f"{case.classname}.{case.name}")
                      elif r._tag == "skipped":
                          skipped += 1
                      else:
                          errors += 1
                          failed_list.append(f"{case.classname}.{case.name} (error)")
              except Exception as e:
                  print(f"Warning: {xml}: {e}")

          rate = passed / max(total, 1) * 100
          md = [
              "## PyTorch NPU Full Test Summary", "",
              "| Metric | Value |", "|--------|-------|",
              f"| Total | {total} |",
              f"| Passed | {passed} |",
              f"| Failed | {failed} |",
              f"| Skipped | {skipped} |",
              f"| Errors | {errors} |",
              f"| **Pass Rate** | **{rate:.2f}%** |", "",
          ]
          if failed_list:
              md += ["### Failed Tests (first 30)", ""]
              md += [f"- `{t}`" for t in failed_list[:30]]

          Path("npu-full-test-summary.md").write_text("\n".join(md))
          Path("npu-full-test-summary.json").write_text(json.dumps(
              {"total": total, "passed": passed, "failed": failed,
               "skipped": skipped, "errors": errors, "failed_tests": failed_list[:100]}, indent=2))

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a") as f:
                  f.write("\n".join(md))
          print("\n".join(md))
          PYEOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npu-full-test-summary
          path: |
            npu-full-test-summary.md
            npu-full-test-summary.json
          retention-days: 30
