<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="476" viewBox="0 0 900 476" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e8eff7"/><stop offset="100%" stop-color="#ccd9ea"/></linearGradient>
  </defs>

  <rect width="900" height="476" rx="16" fill="#f5f6f8" stroke="#e1e4e8" stroke-width="1.5"/>

  <!-- 训练业务 & 推理业务 -->
  <rect x="26" y="26" width="418" height="46" rx="8" fill="#f0f1f3" stroke="#d5d8dc" stroke-width="1.5" opacity="0.8"/>
