  <text x="137" y="236" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="11" fill="#3d444c">nn计算 · 优化器 · 自定义API</text>

  <rect x="244" y="186" width="194" height="64" rx="8" fill="#f0edf4" stroke="#9b8cbf" stroke-width="1.5"/>
